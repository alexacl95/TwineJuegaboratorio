<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de Historias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide { display: none !important; }
        .die-rolling {
            animation: roll 0.6s ease-in-out;
        }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 0.5; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }
        /* Ocultar flechas en inputs numéricos */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-indigo-50 text-slate-800 font-sans min-h-screen flex flex-col items-center">

    <div id="app" class="w-full max-w-4xl mx-auto p-4 flex-grow flex flex-col">
        
        <!-- PANTALLA DE CONFIGURACIÓN -->
        <div id="setup-screen" class="flex-grow flex flex-col items-center justify-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg border border-indigo-100">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-indigo-600 mb-2">Dados de Historias</h1>
                    <p class="text-slate-500 font-medium">Lanza, imagina y cuenta tu cuento</p>
                </div>

                <!-- Categorías -->
                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-700 mb-3">1. Selecciona una Categoría</label>
                    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3" id="category-container">
                        <button class="cat-btn border-2 border-indigo-500 bg-indigo-50 text-indigo-700 rounded-xl py-2 px-1 font-bold text-sm transition" data-cat="ciencia_ficcion">🚀 Ciencia Ficción</button>
                        <button class="cat-btn border-2 border-slate-200 bg-white text-slate-600 rounded-xl py-2 px-1 font-bold text-sm hover:border-indigo-300 transition" data-cat="fantasia">🐉 Fantasía</button>
                        <button class="cat-btn border-2 border-slate-200 bg-white text-slate-600 rounded-xl py-2 px-1 font-bold text-sm hover:border-indigo-300 transition" data-cat="terror">👻 Terror</button>
                        <button class="cat-btn border-2 border-slate-200 bg-white text-slate-600 rounded-xl py-2 px-1 font-bold text-sm hover:border-indigo-300 transition" data-cat="naturaleza">🌲 Naturaleza</button>
                        <button class="cat-btn border-2 border-slate-200 bg-white text-slate-600 rounded-xl py-2 px-1 font-bold text-sm hover:border-indigo-300 transition" data-cat="miscelanea">🍕 Miscelánea</button>
                        <button class="cat-btn border-2 border-slate-200 bg-white text-slate-600 rounded-xl py-2 px-1 font-bold text-sm hover:border-indigo-300 transition" data-cat="todas">🎲 ¡Todas juntas!</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6 mb-8">
                    <!-- Cantidad de dados -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">2. Cantidad de Dados</label>
                        <div class="flex items-center border-2 border-slate-300 rounded-xl overflow-hidden focus-within:border-indigo-500 transition">
                            <button id="btn-dice-minus" class="bg-slate-100 hover:bg-slate-200 px-4 py-3 font-bold text-slate-600 transition">-</button>
                            <input type="number" id="dice-input" min="3" max="15" value="6" readonly class="w-full text-center text-xl font-black focus:outline-none bg-white">
                            <button id="btn-dice-plus" class="bg-slate-100 hover:bg-slate-200 px-4 py-3 font-bold text-slate-600 transition">+</button>
                        </div>
                    </div>
                    <!-- Tiempo de juego -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">3. Tiempo (Minutos)</label>
                        <div class="flex items-center border-2 border-slate-300 rounded-xl overflow-hidden focus-within:border-indigo-500 transition">
                            <button id="btn-time-minus" class="bg-slate-100 hover:bg-slate-200 px-4 py-3 font-bold text-slate-600 transition">-</button>
                            <input type="number" id="time-input" min="1" max="30" value="3" readonly class="w-full text-center text-xl font-black focus:outline-none bg-white">
                            <button id="btn-time-plus" class="bg-slate-100 hover:bg-slate-200 px-4 py-3 font-bold text-slate-600 transition">+</button>
                        </div>
                    </div>
                </div>

                <button id="btn-start" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl py-4 rounded-xl shadow-[0_4px_0_rgb(67,56,202)] hover:shadow-[0_2px_0_rgb(67,56,202)] hover:translate-y-[2px] transition-all">
                    ¡Tirar Dados y Comenzar!
                </button>
            </div>
        </div>

        <!-- PANTALLA DE JUEGO -->
        <div id="game-screen" class="hide flex-grow flex flex-col w-full">
            
            <!-- Cabecera -->
            <div class="bg-white p-4 rounded-2xl shadow-sm flex flex-wrap justify-between items-center mb-8 border border-slate-200 gap-4">
                <div class="flex items-center gap-3">
                    <div id="timer-display" class="text-3xl font-black text-indigo-700 bg-indigo-50 border-2 border-indigo-200 px-4 py-2 rounded-xl">03:00</div>
                </div>
                
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-reroll" class="flex-1 sm:flex-none bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-6 rounded-xl shadow-[0_4px_0_rgb(217,119,6)] hover:shadow-[0_2px_0_rgb(217,119,6)] hover:translate-y-[2px] transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Volver a tirar
                    </button>
                    <button id="btn-finish" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-4 rounded-xl shadow-[0_4px_0_rgb(148,163,184)] hover:shadow-[0_2px_0_rgb(148,163,184)] hover:translate-y-[2px] transition-all">
                        Terminar
                    </button>
                </div>
            </div>

            <!-- Tablero de Dados -->
            <div class="flex-grow flex flex-col items-center justify-center">
                <p class="text-slate-500 mb-6 font-medium text-center">Toca un dado para ver qué significa la imagen.</p>
                <div id="dice-container" class="flex flex-wrap justify-center gap-4 max-w-3xl">
                    <!-- Los dados se generan por JS -->
                </div>
            </div>
        </div>

    </div>

    <!-- MODAL DE DESCRIPCIÓN -->
    <div id="desc-modal" class="hide fixed inset-0 bg-slate-900 bg-opacity-60 flex items-center justify-center z-50 p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center transform transition-transform scale-100">
            <div id="modal-emoji" class="text-8xl mb-4 drop-shadow-md">👽</div>
            <h3 id="modal-text" class="text-3xl font-black text-slate-800 mb-6 capitalize">Extraterrestre</h3>
            <button id="btn-close-modal" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition text-lg">
                Entendido
            </button>
        </div>
    </div>

    <!-- LÓGICA DEL JUEGO -->
    <script>
        // --- 1. BASE DE DATOS DE EMOJIS (Mínimo 50, categorizados en español latino) ---
        const database = {
            ciencia_ficcion: [
                { emoji: "🚀", desc: "Cohete espacial" },
                { emoji: "👽", desc: "Extraterrestre" },
                { emoji: "🤖", desc: "Robot inteligente" },
                { emoji: "🛸", desc: "Platillo volador" },
                { emoji: "🪐", desc: "Planeta con anillos" },
                { emoji: "🌌", desc: "Galaxia" },
                { emoji: "🛰️", desc: "Satélite artificial" },
                { emoji: "👾", desc: "Monstruo espacial" },
                { emoji: "☄️", desc: "Cometa" },
                { emoji: "🔭", desc: "Telescopio" },
                { emoji: "🧪", desc: "Tubo de ensayo" },
                { emoji: "🧬", desc: "Cadena de ADN" },
                { emoji: "🔋", desc: "Batería" }
            ],
            fantasia: [
                { emoji: "🐉", desc: "Dragón" },
                { emoji: "🦄", desc: "Unicornio" },
                { emoji: "🧙", desc: "Mago o Brujo" },
                { emoji: "🧚", desc: "Hada mágica" },
                { emoji: "🏰", desc: "Castillo" },
                { emoji: "🗡️", desc: "Espada" },
                { emoji: "🛡️", desc: "Escudo" },
                { emoji: "🧜", desc: "Sirena" },
                { emoji: "🔮", desc: "Bola de cristal" },
                { emoji: "👑", desc: "Corona real" },
                { emoji: "🧝", desc: "Elfo" },
                { emoji: "🧛", desc: "Vampiro" },
                { emoji: "🧞", desc: "Genio mágico" }
            ],
            terror: [
                { emoji: "👻", desc: "Fantasma" },
                { emoji: "🧟", desc: "Zombi" },
                { emoji: "🦇", desc: "Murciélago" },
                { emoji: "🕸️", desc: "Telaraña" },
                { emoji: "🕷️", desc: "Araña" },
                { emoji: "🏚️", desc: "Casa abandonada" },
                { emoji: "💀", desc: "Calavera" },
                { emoji: "🔪", desc: "Cuchillo" },
                { emoji: "🩸", desc: "Gota de sangre" },
                { emoji: "🌕", desc: "Luna llena" },
                { emoji: "🐺", desc: "Hombre lobo" },
                { emoji: "🎃", desc: "Calabaza de Halloween" },
                { emoji: "👁️", desc: "Ojo misterioso" }
            ],
            naturaleza: [
                { emoji: "🌲", desc: "Pino o bosque" },
                { emoji: "🏔️", desc: "Montaña nevada" },
                { emoji: "🌊", desc: "Ola del mar" },
                { emoji: "🌋", desc: "Volcán en erupción" },
                { emoji: "☀️", desc: "Sol radiante" },
                { emoji: "🌧️", desc: "Nube con lluvia" },
                { emoji: "🌈", desc: "Arcoíris" },
                { emoji: "🌻", desc: "Girasol" },
                { emoji: "🦋", desc: "Mariposa" },
                { emoji: "🦅", desc: "Águila" },
                { emoji: "🐬", desc: "Delfín" },
                { emoji: "🐅", desc: "Tigre" },
                { emoji: "🌵", desc: "Cactus" }
            ],
            miscelanea: [
                { emoji: "🍕", desc: "Rebanada de pizza" },
                { emoji: "🚗", desc: "Carro" },
                { emoji: "🎸", desc: "Guitarra eléctrica" },
                { emoji: "📱", desc: "Celular" },
                { emoji: "⚽", desc: "Balón de fútbol" },
                { emoji: "⌚", desc: "Reloj" },
                { emoji: "💡", desc: "Foco o idea" },
                { emoji: "📚", desc: "Libros" },
                { emoji: "🎈", desc: "Globo" },
                { emoji: "🎁", desc: "Regalo" },
                { emoji: "🔑", desc: "Llave" },
                { emoji: "☕", desc: "Taza de café" },
                { emoji: "💰", desc: "Bolsa de dinero" }
            ]
        };

        // --- 2. VARIABLES DE ESTADO ---
        let currentCategory = 'ciencia_ficcion';
        let diceCount = 6;
        let timeRemaining = 0;
        let timerInterval = null;
        
        // Elementos DOM
        const screens = {
            setup: document.getElementById('setup-screen'),
            game: document.getElementById('game-screen')
        };
        const diceContainer = document.getElementById('dice-container');
        const timerDisplay = document.getElementById('timer-display');
        
        // --- 3. INICIALIZACIÓN Y EVENTOS ---
        document.addEventListener('DOMContentLoaded', () => {
            // Selección de categoría
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.cat-btn').forEach(b => {
                        b.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                        b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
                    });
                    e.target.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
                    e.target.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-700');
                    currentCategory = e.target.getAttribute('data-cat');
                });
            });

            // Controles de cantidad de dados
            const inputDice = document.getElementById('dice-input');
            document.getElementById('btn-dice-minus').addEventListener('click', () => {
                if(inputDice.value > 1) inputDice.value = parseInt(inputDice.value) - 1;
            });
            document.getElementById('btn-dice-plus').addEventListener('click', () => {
                if(inputDice.value < 20) inputDice.value = parseInt(inputDice.value) + 1;
            });

            // Controles de tiempo
            const inputTime = document.getElementById('time-input');
            document.getElementById('btn-time-minus').addEventListener('click', () => {
                if(inputTime.value > 1) inputTime.value = parseInt(inputTime.value) - 1;
            });
            document.getElementById('btn-time-plus').addEventListener('click', () => {
                if(inputTime.value < 60) inputTime.value = parseInt(inputTime.value) + 1;
            });

            // Botones de acción principales
            document.getElementById('btn-start').addEventListener('click', startGame);
            document.getElementById('btn-finish').addEventListener('click', () => {
                clearInterval(timerInterval);
                showScreen('setup');
            });
            document.getElementById('btn-reroll').addEventListener('click', rollDice);

            // Modal
            document.getElementById('btn-close-modal').addEventListener('click', () => {
                document.getElementById('desc-modal').classList.add('hide');
            });
        });

        // --- 4. LÓGICA PRINCIPAL ---
        function showScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.add('hide'));
            screens[screenName].classList.remove('hide');
        }

        function startGame() {
            // Obtener valores
            diceCount = parseInt(document.getElementById('dice-input').value);
            const minutes = parseInt(document.getElementById('time-input').value);
            timeRemaining = minutes * 60;

            // Iniciar Juego
            updateTimerDisplay();
            rollDice();
            
            // Iniciar temporizador
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(timerTick, 1000);

            showScreen('game');
        }

        function getPoolForCategory() {
            if (currentCategory === 'todas') {
                let pool = [];
                for (const cat in database) {
                    pool = pool.concat(database[cat]);
                }
                return pool;
            }
            return database[currentCategory];
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function rollDice() {
            diceContainer.innerHTML = ''; // Limpiar contenedor
            const pool = getPoolForCategory();
            const shuffled = shuffleArray(pool);
            
            // Generar los dados
            for (let i = 0; i < diceCount; i++) {
                // Si piden más dados que la pool, reciclamos imágenes (usando módulo)
                const dieData = shuffled[i % shuffled.length]; 
                
                const die = document.createElement('button');
                die.className = `die bg-white border-2 border-slate-200 rounded-3xl shadow-[0_6px_0_rgb(226,232,240)] w-24 h-24 sm:w-28 sm:h-28 flex items-center justify-center text-5xl sm:text-6xl cursor-pointer transition-all hover:translate-y-[2px] hover:shadow-[0_4px_0_rgb(226,232,240)] active:translate-y-[6px] active:shadow-none focus:outline-none focus:ring-4 focus:ring-indigo-200`;
                die.innerHTML = `<span>${dieData.emoji}</span>`;
                
                // Evento para abrir modal
                die.addEventListener('click', () => {
                    openModal(dieData.emoji, dieData.desc);
                });

                // Efecto de tirar
                die.classList.add('die-rolling');
                setTimeout(() => die.classList.remove('die-rolling'), 600);

                // Variar un poco la rotación inicial para que se vea más natural
                const randomRotate = Math.floor(Math.random() * 20) - 10;
                die.style.transform = `rotate(${randomRotate}deg)`;

                diceContainer.appendChild(die);
            }
        }

        function openModal(emoji, desc) {
            document.getElementById('modal-emoji').textContent = emoji;
            document.getElementById('modal-text').textContent = desc;
            document.getElementById('desc-modal').classList.remove('hide');
        }

        // --- 5. TEMPORIZADOR ---
        function timerTick() {
            if (timeRemaining > 0) {
                timeRemaining--;
                updateTimerDisplay();
                
                // Color rojo al final
                if (timeRemaining <= 10) {
                    timerDisplay.classList.remove('text-indigo-700', 'bg-indigo-50', 'border-indigo-200');
                    timerDisplay.classList.add('text-red-600', 'bg-red-50', 'border-red-200', 'animate-pulse');
                }
            } else {
                clearInterval(timerInterval);
                alert("¡El tiempo se ha acabado! Termina de contar tu historia.");
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            
            if(timeRemaining > 10) {
                timerDisplay.classList.remove('text-red-600', 'bg-red-50', 'border-red-200', 'animate-pulse');
                timerDisplay.classList.add('text-indigo-700', 'bg-indigo-50', 'border-indigo-200');
            }
        }
    </script>
</body>
</html>
