        // --- SISTEMA DE SÍNTESIS DE AUDIO (Web Audio API - Idéntico a TimeLineEpi.html) ---
        const playFeedbackSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'success') {
                    // Chime ascendente alegre
                    const notes = [329.63, 392.00, 523.25]; // E4 -> G4 -> C5
                    notes.forEach((freq, index) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.08);
                        
                        gain.gain.setValueAtTime(0.15, ctx.currentTime + index * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + index * 0.08 + 0.25);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + index * 0.08);
                        osc.stop(ctx.currentTime + index * 0.08 + 0.25);
                    });
                } else if (type === 'error') {
                    // Zumbido grave descendente de error
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.3);
                    
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.warn("AudioContext no soportado o bloqueado por el navegador", e);
            }
        };

        function App() {
            // Estados principales: 'menu' | 'playing' | 'victory' | 'gameover'
            const [gameState, setGameState] = useState('menu');
            
            // Selección de expansiones en menú
            const [selectedThemes, setSelectedThemes] = useState({
                universal: true,
                colombia: false,
                epidemiologia: false,
                inventos: false,
                guerras: false,
                arte: false
            });

            // Ajustes de dificultad / Vidas
            const [maxLives, setMaxLives] = useState(3);

            // Mazo activo, Carta Activa, Línea de tiempo jugada
            const [deck, setDeck] = useState([]);
            const [activeCard, setActiveCard] = useState(null);
            const [timeline, setTimeline] = useState([]);
            
            // Estado de la partida
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [totalRounds, setTotalRounds] = useState(0);
            
            // Historial de la última acción para feedback
            const [feedback, setFeedback] = useState(null); // { correct: bool, card: obj }
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            
            const timelineEndRef = useRef(null);

            // Cambiar selección de temas
            const toggleTheme = (themeId) => {
                setSelectedThemes(prev => ({
                    ...prev,
                    [themeId]: !prev[themeId]
                }));
            };

            // Iniciar Juego y Barajar las Expansiones seleccionadas
            const startGame = () => {
                const keys = Object.keys(selectedThemes).filter(k => selectedThemes[k]);
                if (keys.length === 0) {
                    alert("¡Debes seleccionar al menos una línea temática para jugar!");
                    return;
                }

                let tempDeck = [];
                keys.forEach(key => {
                    const theme = HITOS_DATABASE[key];
                    const cardsWithOrigin = theme.cards.map(c => ({
                        ...c,
                        themeId: theme.id,
                        themeLabel: theme.label,
                        themeBadge: theme.badge
                    }));
                    tempDeck = [...tempDeck, ...cardsWithOrigin];
                });

                // Mezclar baraja
                tempDeck = tempDeck.sort(() => 0.5 - Math.random());

                if (tempDeck.length < 2) {
                    alert("La combinación seleccionada no tiene suficientes cartas para iniciar.");
                    return;
                }

                // Primera carta como pivote del timeline
                const baseCard = tempDeck.shift();
                
                // Siguiente carta a ser colocada por el estudiante
                const initialActiveCard = tempDeck.shift();

                setDeck(tempDeck);
                setActiveCard(initialActiveCard);
                setTimeline([baseCard]);
                setLives(maxLives);
                setScore(0);
                setTotalRounds(0);
                setFeedback(null);
                setGameState('playing');
            };

            // Intentar colocar la carta activa en una ranura específica del Timeline
            const placeCardAt = (position) => {
                if (!activeCard) return;
                
                let isCorrect = false;

                // Validar la cronología en la ranura seleccionada
                if (position === 0) {
                    isCorrect = activeCard.year <= timeline[0].year;
                } else if (position === timeline.length) {
                    isCorrect = activeCard.year >= timeline[timeline.length - 1].year;
                } else {
                    isCorrect = activeCard.year >= timeline[position - 1].year && activeCard.year <= timeline[position].year;
                }

                setTotalRounds(prev => prev + 1);

                if (isCorrect) {
                    playFeedbackSound('success');

                    // Inserción correcta
                    const newTimeline = [...timeline];
                    newTimeline.splice(position, 0, activeCard);
                    setTimeline(newTimeline);
                    setScore(prev => prev + 10);
                    setFeedback({ correct: true, card: activeCard });

                    // Sacar la siguiente del mazo
                    if (deck.length > 0) {
                        const nextCard = deck[0];
                        setActiveCard(nextCard);
                        setDeck(deck.slice(1));
                    } else {
                        // Victoria
                        setActiveCard(null);
                        setTimeout(() => setGameState('victory'), 1000);
                    }
                } else {
                    playFeedbackSound('error');

                    // Fallo: Reducir vidas y si llega a cero, Fin del Juego
                    setLives(prev => {
                        const nextLives = prev - 1;
                        if (nextLives <= 0) {
                            setTimeout(() => setGameState('gameover'), 1000);
                        }
                        return nextLives;
                    });
                    setFeedback({ correct: false, card: activeCard });

                    // Metodología de aprendizaje activo: la carta se auto-ubica de manera correcta
                    // para que el estudiante aprenda la fecha y la línea siga un orden cronológico perfecto.
                    const correctPosition = findCorrectPosition(activeCard);
                    const correctedTimeline = [...timeline];
                    correctedTimeline.splice(correctPosition, 0, activeCard);
                    setTimeline(correctedTimeline);

                    // Sacar otra si hay disponibles
                    if (deck.length > 0) {
                        const nextCard = deck[0];
                        setActiveCard(nextCard);
                        setDeck(deck.slice(1));
                    } else {
                        setActiveCard(null);
                        setTimeout(() => setGameState('victory'), 1000);
                    }
                }
            };

            const findCorrectPosition = (card) => {
                for (let i = 0; i < timeline.length; i++) {
                    if (card.year <= timeline[i].year) {
                        return i;
                    }
                }
                return timeline.length;
            };

            const formatYear = (year) => {
                if (year < 0) return `${Math.abs(year)} a.C.`;
                return `${year} d.C.`;
            };

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    
                    {/* CUERPO DEL SIMULADOR */}
                    <div className="flex-grow p-3 sm:p-6 lg:p-8 flex justify-center items-start overflow-y-auto">

                                    <h2 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">Configuración del Reto de Aula</h2>
                                    <p className="text-slate-500 text-sm md:text-base font-medium mb-8">
                                        Selecciona y combina los módulos de cartas temáticas que deseas incluir para construir la línea del tiempo.
                                    </p>

                                    {/* SECCIÓN EXPANSIONES DE TEMAS (CARTAS.XLSX) */}
                                    <div className="mb-8 text-left">
                                        <h3 className="text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-4">Paso 1: Elige las Categorías de Cartas</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                            {Object.values(HITOS_DATABASE).map(theme => {
                                                const isSelected = selectedThemes[theme.id];
                                                return (
                                                    <button
                                                        key={theme.id}
                                                        onClick={() => toggleTheme(theme.id)}
                                                        className={`p-4 rounded-2xl font-bold border-2 transition-all flex items-center justify-between gap-3 text-left ${
                                                            isSelected ? theme.color + ' border-current shadow-md animate-pop-in' : 'bg-slate-50 border-slate-200 text-slate-600 hover:border-indigo-300'
                                                        }`}
                                                    >
                                                        <span className="text-sm md:text-base leading-tight">{theme.label}</span>
                                                        <span className={`w-6 h-6 rounded-full flex items-center justify-center border text-xs ${
                                                            isSelected ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 text-slate-300'
                                                        }`}>
                                                            {isSelected ? '✓' : ''}
                                                        </span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* AJUSTES ADICIONALES */}
                                    <div className="mb-10 text-left border-t border-slate-100 pt-6">
                                        <label className="block text-sm font-extrabold text-slate-400 uppercase tracking-widest mb-2">Paso 2: Vidas (Errores Permitidos)</label>
                                        <div className="flex bg-slate-100 p-1 rounded-xl w-fit border border-slate-200">
                                            {[1, 3, 5].map(v => (
                                                <button 
                                                    key={v}
                                                    onClick={() => setMaxLives(v)}
                                                    className={`px-4 py-2 font-bold rounded-lg text-sm transition-all ${maxLives === v ? 'bg-white text-indigo-700 shadow shadow-indigo-600/10' : 'text-slate-500 hover:text-slate-800'}`}
                                                >
                                                    {v === 1 ? 'Extremo (1 Vida)' : `${v} Vidas`}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={startGame}
                                        className="w-full sm:w-auto px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg sm:text-xl rounded-2xl shadow-[0_4px_0_rgb(67,56,202)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(67,56,202)] transition-all"
                                    >
                                        ¡Comenzar Desafío! ➔
                                    </button>
                                </div>
                            )}

                            {/* --- PANTALLA 2: ACTIVIDAD GRUPAL DIRECTIVA "EPIDEMIOLOGÍA EN EL TIEMPO" --- */}
                            {gameState === 'playing' && (
                                <div className="space-y-6 animate-fade-in w-full">
                                    
                                    {/* Cabecera de estado superior idéntica a TimeLineEpi.html */}
                                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <div className="flex items-center gap-4 w-full sm:w-auto">
                                            <button 
                                                onClick={() => setShowExitConfirm(true)}
                                                className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-colors"
                                                title="Salir al menú principal"
                                            >
                                                🏠
                                            </button>
                                            <div>
                                                <h3 className="font-extrabold text-slate-800">Hitos de la Historia en el Tiempo</h3>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Actividad Grupal Directiva</p>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between sm:justify-end gap-6 w-full sm:w-auto border-t sm:border-0 pt-3 sm:pt-0">
                                            <div className="text-center">
                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-wider">Puntuación</span>
                                                <div className="text-2xl font-black text-indigo-600 leading-none">{score} <span className="text-xs text-slate-400">pts</span></div>
                                            </div>
                                            <div className="w-px h-8 bg-slate-200"></div>
                                            <div className="text-center">
                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-wider">Mazo</span>
                                                <div className="text-xl font-black text-slate-700 leading-none">{deck.length} <span className="text-xs text-slate-400">rest.</span></div>
                                            </div>
                                            <div className="w-px h-8 bg-slate-200"></div>
                                            <div className="text-center">
                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-wider">Vidas</span>
                                                <div className="flex gap-1 justify-center mt-1">
                                                    {Array.from({ length: maxLives }).map((_, i) => (
                                                        <span key={i} className={`text-lg leading-none ${i < lives ? 'text-rose-500' : 'text-slate-300'}`}>❤️</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* FEEDBACK DINÁMICO DE ACCIÓN */}
                                    <div className="min-h-12 flex justify-center items-center">
                                        {feedback && (
                                            <div className={`px-6 py-2 rounded-full font-bold text-sm shadow-sm border animate-pop-in flex items-center gap-2 ${
                                                feedback.correct 
                                                ? 'bg-emerald-100 text-emerald-800 border-emerald-200' 
                                                : 'bg-rose-100 text-rose-800 border-rose-200'
                                            }`}>
                                                <span>{feedback.correct ? '✅' : '❌'}</span>
                                                <span>
                                                    <strong>{feedback.card.title}</strong> ocurrió en el año <strong>{formatYear(feedback.card.year)}</strong>.
                                                    {feedback.correct ? ' ¡Ubicación correcta!' : ' ¡Ubicación incorrecta! Se auto-ubica para guiar.'}
                                                </span>
                                            </div>
                                        )}
                                    </div>

                                    {/* SECCIÓN JUEGO CENTRAL (CARTA ACTIVA + LÍNEA VERTICAL) */}
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                                        
                                        {/* LADO IZQUIERDO: LA CARTA ACTIVA A UBICAR (STICKY) */}
                                        <div className="md:col-span-4 md:sticky md:top-6 space-y-4">
                                            <div className="bg-white rounded-3xl p-5 border-2 border-indigo-200 shadow-xl flex flex-col justify-between h-72 relative overflow-hidden animate-pop-in">
                                                <div className="absolute -top-4 -right-4 w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center opacity-40 text-4xl">
                                                    ❓
                                                </div>
                                                <div className="space-y-3">
                                                    <div>
                                                        <span className={`text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded border inline-block ${activeCard?.themeBadge}`}>
                                                            {activeCard?.themeLabel}
                                                        </span>
                                                    </div>
                                                    <h4 className="font-black text-slate-800 text-lg leading-snug">{activeCard?.title}</h4>
                                                    <p className="text-xs text-slate-500 leading-relaxed">{activeCard?.desc}</p>
                                                </div>
                                                
                                                <div className="text-center font-bold text-xs text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-xl py-3 mt-4">
                                                    ¿Dónde encaja este hito en la línea?
                                                </div>
                                            </div>
                                            <p className="text-center text-xs text-slate-400 font-bold uppercase tracking-wider hidden md:block">
                                                Haz clic en las ranuras de la línea de tiempo a tu derecha para colocar esta carta.
                                            </p>
                                        </div>

                                        {/* LADO DERECHO: LÍNEA DE TIEMPO VERTICAL CON RANURAS */}
                                        <div className="md:col-span-8 space-y-3">
                                            
                                            {/* Ranura 0 (Inicio - Arriba del todo) */}
                                            <button 
                                                onClick={() => placeCardAt(0)}
                                                className="w-full py-3 border-2 border-dashed border-indigo-300 hover:border-indigo-500 hover:bg-indigo-50 text-indigo-500 hover:text-indigo-700 font-black text-xs rounded-2xl transition-all duration-200 flex items-center justify-center gap-2 shadow-sm"
                                            >
                                                <span className="text-lg">▲</span>
                                                <span>Insertar antes de {timeline[0]?.title}</span>
                                            </button>

                                            {/* Mapeo del Timeline de Forma Vertical */}
                                            {timeline.map((card, idx) => (
                                                <React.Fragment key={idx}>
                                                    
                                                    {/* Tarjeta colocada */}
                                                    <div className="bg-white rounded-2xl p-4 shadow-md border-l-8 border-indigo-500 flex items-center justify-between gap-4 animate-pop-in relative overflow-hidden">
                                                        <div className="space-y-1 flex-grow">
                                                            <div className="flex items-center gap-2">
                                                                <span className={`text-[8px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded border inline-block ${card.themeBadge}`}>
                                                                    {card.themeLabel.split(' ')[0]}
                                                                </span>
                                                            </div>
                                                            <h4 className="font-extrabold text-slate-800 text-sm sm:text-base leading-tight">{card.title}</h4>
                                                            <p className="text-[10px] sm:text-xs text-slate-500 leading-snug">{card.desc}</p>
                                                        </div>
                                                        <div className="text-right shrink-0 min-w-[90px]">
                                                            <div className="font-black text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-2 text-xs sm:text-sm text-center shadow-sm">
                                                                {formatYear(card.year)}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Ranura Intermedia u Hoya inferior */}
                                                    <button 
                                                        onClick={() => placeCardAt(idx + 1)}
                                                        className="w-full py-3 border-2 border-dashed border-indigo-300 hover:border-indigo-500 hover:bg-indigo-50 text-indigo-500 hover:text-indigo-700 font-black text-xs rounded-2xl transition-all duration-200 flex items-center justify-center gap-2 shadow-sm"
                                                    >
                                                        <span className="text-lg">▼</span>
                                                        <span>
                                                            {idx === timeline.length - 1 
                                                                ? `Insertar después de ${card.title}` 
                                                                : `Insertar aquí`
                                                            }
                                                        </span>
                                                    </button>

                                                </React.Fragment>
                                            ))}

                                            <div ref={timelineEndRef} />
                                        </div>

                                    </div>

                                </div>
                            )}

                            {/* --- PANTALLA 3: VICTORIA (MAZO VACÍO) --- */}
                            {gameState === 'victory' && (
                                <div className="max-w-3xl mx-auto animate-fade-in space-y-6 w-full">
                                    <div className="bg-slate-900 border-4 border-emerald-500 rounded-[2rem] p-6 md:p-10 shadow-2xl text-center text-white">
                                        <div className="text-7xl mb-4 animate-bounce">🏆🌟👑</div>
                                        <h2 className="text-3xl md:text-5xl font-black text-emerald-400 tracking-tight mb-2">¡Sincronización Lograda!</h2>
                                        <p className="text-slate-400 text-sm md:text-base font-medium mb-8">Has ordenado exitosamente los hitos en {totalRounds} intentos.</p>

                                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-left max-w-2xl mx-auto mb-8 text-sm md:text-base leading-relaxed text-slate-300">
                                            <h4 className="font-black text-white text-base mb-2">Análisis de la Partida</h4>
                                            <p className="mb-4">
                                                Lograste secuenciar de forma vertical y cronológica los hitos seleccionados de la base de datos de cartas. Demuestras una excelente capacidad de inferencia histórica integrando diferentes ramas del saber.
                                            </p>
                                        </div>

                                        <h3 className="font-extrabold text-slate-300 text-xs uppercase tracking-widest mb-4">Línea del Tiempo Final Generada</h3>
                                        <div className="space-y-3 max-w-2xl mx-auto text-left text-slate-800">
                                            {timeline.map((card, idx) => (
                                                <div key={idx} className="bg-white rounded-2xl p-4 shadow-md border-l-8 border-indigo-500 flex items-center justify-between gap-4">
                                                    <div className="space-y-1">
                                                        <span className={`text-[8px] font-black uppercase tracking-widest px-1.5 py-0.5 rounded border inline-block ${card.themeBadge}`}>
                                                            {card.themeLabel.split(' ')[0]}
                                                        </span>
                                                        <h4 className="font-extrabold text-slate-800 text-sm leading-tight">{card.title}</h4>
                                                    </div>
                                                    <div className="text-right shrink-0 min-w-[95px]">
                                                        <div className="font-black text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-1.5 text-xs text-center shadow-sm">
                                                            {formatYear(card.year)}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
                                            <button 
                                                onClick={() => setGameState('menu')}
                                                className="px-8 py-3.5 bg-emerald-600 hover:bg-emerald-55 text-white font-black rounded-xl transition-all shadow-[0_4px_0_rgb(5,150,105)] text-sm md:text-base hover:translate-y-[2px]"
                                            >
                                                🔄 Volver a Configurar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- PANTALLA 4: JUEGO TERMINADO (DERROTA) --- */}
                            {gameState === 'gameover' && (
                                <div className="max-w-xl mx-auto animate-fade-in space-y-6 w-full">
                                    <div className="bg-white border-2 border-slate-200 rounded-[2rem] p-6 md:p-10 shadow-xl text-center text-slate-800">
                                        <div className="text-7xl mb-4 animate-bounce">💔</div>
                                        <h2 className="text-3xl font-black text-rose-600 tracking-tight mb-2">Sincronización Incompleta</h2>
                                        <p className="text-slate-500 text-sm md:text-base font-medium mb-8">Has agotado tus corazones de sincronización.</p>

                                        <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 text-left mb-8 text-xs sm:text-sm leading-relaxed text-slate-600">
                                            <h4 className="font-bold text-slate-700 text-sm mb-2">Consejo de Selección</h4>
                                            <p className="mb-2">
                                                La clave de una línea del tiempo es pensar de forma relativa. Evalúa qué hitos necesitaron de descubrimientos previos para poder existir (por ejemplo, la escritura cuneiforme debió ocurrir miles de años antes que la imprenta).
                                            </p>
                                            <p>
                                                ¡Inténtalo de nuevo! La repetición te ayudará a consolidar la ubicación de los hitos.
                                            </p>
                                        </div>

                                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                            <button 
                                                onClick={startGame}
                                                className="flex-1 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-xl transition-all shadow-[0_4px_0_rgb(67,56,202)] text-sm md:text-base hover:translate-y-[2px]"
                                            >
                                                🔄 Reintentar Partida
                                            </button>
                                            <button 
                                                onClick={() => setGameState('menu')}
                                                className="flex-1 py-3.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl transition-all text-sm md:text-base"
                                            >
                                                ⚙️ Configuración
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CONFIRMACIÓN DE ABANDONO */}
                            {showExitConfirm && (
                                <div className="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                                    <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-200 animate-pop-in text-center">
                                        <div className="text-5xl mb-4">🚪</div>
                                        <h3 className="text-xl font-black text-slate-800 mb-2">¿Quieres abandonar la partida?</h3>
                                        <p className="text-sm text-slate-500 mb-6">
                                            Perderás todo el progreso de la partida actual y volverás a la pantalla de configuración.
                                        </p>
                                        <div className="flex gap-3">
                                            <button 
                                                onClick={() => setShowExitConfirm(false)}
                                                className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm"
                                            >
                                                Cancelar
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    setShowExitConfirm(false);
                                                    setGameState('menu');
                                                }}
                                                className="flex-1 py-3 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl transition-colors text-sm shadow-md shadow-rose-600/10"
                                            >
                                                Sí, salir
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
