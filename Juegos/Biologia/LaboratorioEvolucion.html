<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laboratorio de Evolución Artificial</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #f0fdf4; /* emerald-50 */
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-font-smoothing: antialiased;
            touch-action: pan-y; /* Previene comportamientos extraños, pero permite scroll */
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .drawing-canvas {
            touch-action: none; /* Bloquea el scroll mientras se dibuja */
            cursor: crosshair;
        }

        .offspring-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .offspring-card:hover {
            transform: scale(1.03) translateY(-4px);
            box-shadow: 0 12px 20px -3px rgba(16, 185, 129, 0.15);
        }
        
        /* Patrón de fondo biológico (puntos) */
        .bg-dots {
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        
        /* Clase especial para simular ecuaciones matemáticas en HTML */
        .math-eq {
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const MAX_GENERATIONS = 10; // Límite de generaciones establecido

        // --- PARTES ANATÓMICAS DEFINIDAS ---
        const ANATOMY_PARTS = [
            { id: 'cuerpo', label: 'Cuerpo 🦦', placeholder: 'Dibuja el torso o cuerpo central.' },
            { id: 'cabeza', label: 'Cabeza 🐱', placeholder: 'Dibuja la cabeza sobre o junto al cuerpo.' },
            { id: 'ojos', label: 'Ojos 👀', placeholder: 'Dibuja los ojos en el área de la cabeza.' },
            { id: 'boca', label: 'Boca 👄', placeholder: 'Dibuja la boca, pico o colmillos.' },
            { id: 'patas', label: 'Patas 🦵', placeholder: 'Dibuja extremidades, aletas o soporte inferior.' },
            { id: 'cola', label: 'Cola 🦎', placeholder: 'Dibuja una cola o antenas traseras.' }
        ];

        // Componente: Renderiza el organismo completo o destaca una parte mostrando las otras como fantasmas
        const RenderOrganism = ({ parts, className="w-full h-full", activePartId = null }) => {
            return (
                <svg viewBox="0 0 400 400" className={className} style={{backgroundColor: 'white', borderRadius: '1rem'}}>
                    {ANATOMY_PARTS.map(part => {
                        const isGhost = activePartId !== null && part.id !== activePartId;
                        const partLines = parts[part.id] || [];
                        return partLines.map((line, idx) => (
                            <polyline
                                key={`${part.id}-${idx}`}
                                points={line.points.map(p => `${p.x},${p.y}`).join(' ')}
                                fill="none"
                                stroke={isGhost ? '#e2e8f0' : line.color}
                                strokeWidth={line.width}
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                strokeOpacity={isGhost ? 0.2 : 1}
                            />
                        ));
                    })}
                </svg>
            );
        };

        // --- MOTOR MATEMÁTICO: INTERPOLADOR PARA MORFOSIS ANIMADA ---
        const interpolateOrganism = (orgA, orgB, t) => {
            if (!orgA) return orgB;
            if (!orgB) return orgA;
            let interpolated = {};
            
            ANATOMY_PARTS.forEach(part => {
                const linesA = orgA[part.id] || [];
                const linesB = orgB[part.id] || [];
                const maxLen = Math.max(linesA.length, linesB.length);
                let partLines = [];
                
                for (let i = 0; i < maxLen; i++) {
                    const lineA = linesA[i];
                    const lineB = linesB[i];
                    
                    if (lineA && lineB) {
                        // Ambos existen: interpolar puntos de forma homogénea
                        const maxPts = Math.max(lineA.points.length, lineB.points.length);
                        let pts = [];
                        for (let j = 0; j < maxPts; j++) {
                            const pA = lineA.points[j] || lineA.points[lineA.points.length - 1];
                            const pB = lineB.points[j] || lineB.points[lineB.points.length - 1];
                            pts.push({
                                x: pA.x + (pB.x - pA.x) * t,
                                y: pA.y + (pB.y - pA.y) * t
                            });
                        }
                        const color = t < 0.5 ? lineA.color : lineB.color;
                        const width = lineA.width + (lineB.width - lineA.width) * t;
                        partLines.push({ points: pts, color, width });
                    } else if (lineA) {
                        // Solo existe en el ancestro: se desvanece de grosor gradualmente
                        partLines.push({
                            ...lineA,
                            width: lineA.width * (1 - t)
                        });
                    } else if (lineB) {
                        // Mutación aditiva nueva: aparece gradualmente de la nada
                        partLines.push({
                            ...lineB,
                            width: lineB.width * t
                        });
                    }
                }
                interpolated[part.id] = partLines;
            });
            return interpolated;
        };

        function App() {
            // Estados principales: 'intro' | 'draw' | 'evolve' | 'history' | 'manual_edit' | 'victory'
            const [gameState, setGameState] = useState('intro');
            
            // Historial evolutivo: almacena objetos con la estructura de partes
            const [evolutionHistory, setEvolutionHistory] = useState([]);
            
            // Estructura de partes del animal actual
            const [organismParts, setOrganismParts] = useState({
                cuerpo: [], cabeza: [], ojos: [], boca: [], patas: [], cola: []
            });

            // Control de edición y dibujo
            const [activePart, setActivePart] = useState('cuerpo');
            const [lines, setLines] = useState([]); // Líneas de la parte activa actual
            const [currentLine, setCurrentLine] = useState(null);
            const [color, setColor] = useState('#1e293b');
            const [strokeWidth, setStrokeWidth] = useState(4);
            const svgRef = useRef(null);

            // Estado de la evolución
            const [offspring, setOffspring] = useState([]);
            const [mutationRate, setMutationRate] = useState(2); // Escala 1-5
            const [editingOrganism, setEditingOrganism] = useState(null); // Almacena el animal que se va a editar manualmente

            // --- ESTADOS DEL REPRODUCTOR DE ANIMACIÓN (MORFOSIS) ---
            const [playValue, setPlayValue] = useState(0); // Posición fraccionaria de reproducción (0 a history.length - 1)
            const [isPlaying, setIsPlaying] = useState(false);
            const [animSpeed, setAnimSpeed] = useState(1); // Multiplicador de velocidad de reproducción

            // --- SINCRONIZAR LIENZO AL CAMBIAR DE PARTE ANATÓMICA ---
            useEffect(() => {
                if (gameState === 'draw' || gameState === 'manual_edit') {
                    setLines(organismParts[activePart] || []);
                }
            }, [activePart, gameState]);

            // --- REPRODUCTOR EN BUCLE (REQUEST ANIMATION FRAME) ---
            useEffect(() => {
                let frameId;
                let lastTime = performance.now();

                const tick = (time) => {
                    if (!isPlaying || evolutionHistory.length <= 1) return;
                    
                    const delta = time - lastTime;
                    lastTime = time;

                    setPlayValue(prev => {
                        // Avanza el tiempo según la velocidad seleccionada
                        let nextVal = prev + (delta / 1000) * animSpeed;
                        const limit = evolutionHistory.length - 1;
                        if (nextVal >= limit) {
                            return 0; // Reinicio en bucle continuo
                        }
                        return nextVal;
                    });

                    frameId = requestAnimationFrame(tick);
                };

                if (isPlaying && evolutionHistory.length > 1) {
                    lastTime = performance.now();
                    frameId = requestAnimationFrame(tick);
                }

                return () => cancelAnimationFrame(frameId);
            }, [isPlaying, animSpeed, evolutionHistory.length]);

            // Forzar Play automático al entrar a la vista de Historia o Victoria
            useEffect(() => {
                if ((gameState === 'history' || gameState === 'victory') && evolutionHistory.length > 1) {
                    setPlayValue(0);
                    setIsPlaying(true);
                } else {
                    setIsPlaying(false);
                }
            }, [gameState]);

            // --- LÓGICA DE DIBUJO ---
            const getCoords = (e) => {
                const svg = svgRef.current;
                if (!svg) return { x: 0, y: 0 };
                const CTM = svg.getScreenCTM();
                let clientX, clientY;

                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                return {
                    x: (clientX - CTM.e) / CTM.a,
                    y: (clientY - CTM.f) / CTM.d
                };
            };

            const startDrawing = (e) => {
                e.preventDefault();
                const coords = getCoords(e);
                setCurrentLine({ points: [coords], color, width: strokeWidth });
            };

            const draw = (e) => {
                e.preventDefault();
                if (!currentLine) return;
                const coords = getCoords(e);
                setCurrentLine({
                    ...currentLine,
                    points: [...currentLine.points, coords]
                });
            };

            const endDrawing = () => {
                if (currentLine) {
                    const newLines = [...lines, currentLine];
                    setLines(newLines);
                    setOrganismParts(prev => ({ ...prev, [activePart]: newLines }));
                    setCurrentLine(null);
                }
            };

            const clearCanvas = () => {
                if (window.confirm('¿Seguro que quieres borrar el dibujo de esta parte?')) {
                    setLines([]);
                    setOrganismParts(prev => ({ ...prev, [activePart]: [] }));
                }
            };

            const undoLastLine = () => {
                const undone = lines.slice(0, -1);
                setLines(undone);
                setOrganismParts(prev => ({ ...prev, [activePart]: undone }));
            };

            // --- ALGORITMO GENÉTICO PRESERVATIVO (MUTACIONES ANATÓMICAS E INSURGENCIAS BIOLÓGICAS) ---
            const mutateDrawing = (originalParts, rate) => {
                if (!originalParts) return {};
                
                // Clonación profunda
                let newParts = JSON.parse(JSON.stringify(originalParts));
                
                // 1. Obtener Bounding Box global de todo el organismo para transformaciones afines
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                let hasPoints = false;

                ANATOMY_PARTS.forEach(part => {
                    const originalLines = newParts[part.id] || [];
                    originalLines.forEach(line => {
                        line.points.forEach(p => {
                            hasPoints = true;
                            if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                            if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
                        });
                    });
                });

                const width = hasPoints ? Math.max(15, maxX - minX) : 200;
                const height = hasPoints ? Math.max(15, maxY - minY) : 200;
                const centerX = hasPoints ? minX + width / 2 : 200;
                const centerY = hasPoints ? minY + height / 2 : 200;
                const mainColor = newParts.cuerpo?.[0]?.color || '#1e293b';
                const mainWidth = newParts.cuerpo?.[0]?.width || 4;

                // Parámetros de mutación basados en la tasa (rate)
                const scaleVariance = rate * 0.05; // Variación controlada del tamaño
                const widthVariance = rate * 0.4;  // Variación del grosor de trazo
                const pigmentChance = rate * 0.07;  // Probabilidad baja de cambio de color
                const patternChance = rate * 0.14;  // Probabilidad de agregar manchas internas
                const shrinkLegsChance = rate * 0.20; // Probabilidad de encoger patas hacia el cuerpo

                // 2. Transformaciones de escala/proporciones por sección anatómica (para mantener la integridad)
                ANATOMY_PARTS.forEach(part => {
                    const partLines = newParts[part.id] || [];
                    if (partLines.length === 0) return;

                    // Cada parte anatómica muta su escala y grosor de forma uniforme
                    const scaleX = 1 + (Math.random() - 0.5) * scaleVariance;
                    const scaleY = 1 + (Math.random() - 0.5) * scaleVariance;
                    const strokeChange = (Math.random() - 0.5) * widthVariance;

                    // Cambiar color a una paleta natural armoniosa y poco estridente
                    let targetColor = partLines[0].color;
                    if (Math.random() < pigmentChance) {
                        const naturalColors = ['#1e293b', '#334155', '#475569', '#5c4033', '#8b5a2b', '#cd853f', '#a0522d', '#2e8b57', '#4a5d4e'];
                        targetColor = naturalColors[Math.floor(Math.random() * naturalColors.length)];
                    }

                    newParts[part.id] = partLines.map(line => {
                        let newWidth = line.width + strokeChange;
                        newWidth = Math.max(1.5, Math.min(12, newWidth)); // Límites seguros de grosor

                        return {
                            ...line,
                            color: targetColor,
                            width: newWidth,
                            points: line.points.map(p => {
                                // Escalar y trasladar ligeramente relativo al centro de masa global
                                const x = centerX + (p.x - centerX) * scaleX;
                                const y = centerY + (p.y - centerY) * scaleY;
                                return { x, y };
                            })
                        };
                    });
                });

                // --- VARIACIONES EN LAS PATAS (ENCOGER HACIA EL CUERPO) ---
                if (newParts.patas && newParts.patas.length > 0 && Math.random() < shrinkLegsChance) {
                    newParts.patas = newParts.patas.map(line => {
                        // Buscamos el punto más alto de esta pata (conexión al cuerpo)
                        const minYCoord = Math.min(...line.points.map(p => p.y));
                        return {
                            ...line,
                            points: line.points.map(p => ({
                                x: p.x,
                                // Reducimos la longitud vertical de la pata atrayendo los puntos hacia arriba
                                y: minYCoord + (p.y - minYCoord) * 0.45
                            }))
                        };
                    });
                }

                // --- ANALIZAR LA CABEZA PARA VARIACIONES DE OJOS Y BOCA ---
                let headMinX = Infinity, headMaxX = -Infinity, headMinY = Infinity, headMaxY = -Infinity;
                let hasHead = false;
                (newParts.cabeza || []).forEach(line => {
                    line.points.forEach(p => {
                        hasHead = true;
                        if (p.x < headMinX) headMinX = p.x; if (p.x > headMaxX) headMaxX = p.x;
                        if (p.y < headMinY) headMinY = p.y; if (p.y > headMaxY) headMaxY = p.y;
                    });
                });

                if (hasHead) {
                    const hCenterX = headMinX + (headMaxX - headMinX) / 2;
                    const hSize = (headMaxX - headMinX) * 0.12;

                    // --- VARIACIONES EN LA BOCA (DESAPARECER O NUEVO ESTILO) ---
                    const mouthVariationChance = rate * 0.18;
                    if (Math.random() < mouthVariationChance) {
                        const r = Math.random();
                        if (r < 0.35) {
                            // Opción A: Desaparece completamente
                            newParts.boca = [];
                        } else {
                            // Opción B: Cambiar estilo
                            const mouthY = headMinY + (headMaxY - headMinY) * 0.68;
                            if (r < 0.60) {
                                // Estilo: Sonrisa curva suave
                                let smilePoints = [];
                                for (let a = 0.2; a <= Math.PI - 0.2; a += 0.5) {
                                    smilePoints.push({
                                        x: hCenterX + Math.cos(a) * hSize,
                                        y: mouthY + Math.sin(a) * hSize * 0.5
                                    });
                                }
                                newParts.boca = [{ points: smilePoints, color: '#e11d48', width: 3 }];
                            } else if (r < 0.85) {
                                // Estilo: Pico triangular cerrado
                                newParts.boca = [{
                                    points: [
                                        { x: hCenterX - hSize, y: mouthY },
                                        { x: hCenterX + hSize, y: mouthY },
                                        { x: hCenterX, y: mouthY + hSize },
                                        { x: hCenterX - hSize, y: mouthY }
                                    ],
                                    color: '#ea580c',
                                    width: 3
                                }];
                            } else {
                                // Estilo: Colmillos biológicos
                                newParts.boca = [
                                    { points: [{ x: hCenterX - hSize/2, y: mouthY }, { x: hCenterX - hSize/2, y: mouthY + hSize }], color: mainColor, width: 3.5 },
                                    { points: [{ x: hCenterX + hSize/2, y: mouthY }, { x: hCenterX + hSize/2, y: mouthY + hSize }], color: mainColor, width: 3.5 }
                                ];
                            }
                        }
                    }

                    // --- VARIACIONES EN LOS OJOS (DESAPARECER O NUEVO ESTILO) ---
                    const eyesVariationChance = rate * 0.18;
                    if (Math.random() < eyesVariationChance) {
                        const r = Math.random();
                        if (r < 0.35) {
                            // Opción A: Desaparece completamente
                            newParts.ojos = [];
                        } else {
                            // Opción B: Cambiar estilo
                            const eyesY = headMinY + (headMaxY - headMinY) * 0.4;
                            if (r < 0.60) {
                                // Estilo: Ojos cerrados/felices (horizontales curvos)
                                newParts.ojos = [
                                    { points: [{ x: hCenterX - hSize * 1.5, y: eyesY }, { x: hCenterX - hSize * 0.5, y: eyesY }], color: '#1e293b', width: 3.5 },
                                    { points: [{ x: hCenterX + hSize * 0.5, y: eyesY }, { x: hCenterX + hSize * 1.5, y: eyesY }], color: '#1e293b', width: 3.5 }
                                ];
                            } else if (r < 0.85) {
                                // Estilo: Grandes ojos redondos (no invasivos)
                                let eyeL = [];
                                let eyeR = [];
                                for (let a = 0; a <= Math.PI * 2 + 0.1; a += 0.8) {
                                    eyeL.push({ x: (hCenterX - hSize) + Math.cos(a) * 4, y: eyesY + Math.sin(a) * 4 });
                                    eyeR.push({ x: (hCenterX + hSize) + Math.cos(a) * 4, y: eyesY + Math.sin(a) * 4 });
                                }
                                newParts.ojos = [
                                    { points: eyeL, color: '#2563eb', width: 2.5 },
                                    { points: eyeR, color: '#2563eb', width: 2.5 }
                                ];
                            } else {
                                // Estilo: Ojos salvajes/pupila vertical
                                newParts.ojos = [
                                    { points: [{ x: hCenterX - hSize, y: eyesY - 3 }, { x: hCenterX - hSize, y: eyesY + 3 }], color: '#10b981', width: 3.5 },
                                    { points: [{ x: hCenterX + hSize, y: eyesY - 3 }, { x: hCenterX + hSize, y: eyesY + 3 }], color: '#10b981', width: 3.5 }
                                ];
                            }
                        }
                    }
                }

                // --- 3. MUTACIÓN ADITIVA CONTROLADA (MANCHAS DENTRO DEL CUERPO) ---
                // Para evitar líneas caóticas y asegurar que estén dentro del objeto, las manchas
                // y patrones decorativos se anclan a los puntos existentes del cuerpo del animal.
                if (Math.random() < patternChance && newParts.cuerpo && newParts.cuerpo.length > 0) {
                    const bodyLines = newParts.cuerpo;
                    const numSpots = Math.floor(Math.random() * 2) + 1;
                    const matchColor = '#475569'; // Tono sutil

                    for (let i = 0; i < numSpots; i++) {
                        // Seleccionamos un trazo del cuerpo al azar
                        const targetLine = bodyLines[Math.floor(Math.random() * bodyLines.length)];
                        if (targetLine && targetLine.points.length > 2) {
                            // Seleccionamos un punto intermedio de la línea del cuerpo
                            const anchorPt = targetLine.points[Math.floor(targetLine.points.length / 2)];
                            const rSpot = 3 + Math.random() * 3;

                            // Trazamos un pequeño anillo o lunar cerrado centrado exactamente en el cuerpo
                            let spotPoints = [];
                            for (let a = 0; a <= Math.PI * 2 + 0.1; a += Math.PI / 4) {
                                spotPoints.push({
                                    x: anchorPt.x + Math.cos(a) * rSpot,
                                    y: anchorPt.y + Math.sin(a) * rSpot
                                });
                            }
                            
                            // Lo añadimos al cuerpo para que mantenga coherencia estructural
                            newParts.cuerpo.push({
                                points: spotPoints,
                                color: matchColor,
                                width: Math.max(1.5, mainWidth * 0.4)
                            });
                        }
                    }
                }

                return newParts;
            };

            const generateOffspring = (parentParts, count = 4) => {
                let newOffspring = [];
                for (let i = 0; i < count; i++) {
                    newOffspring.push({
                        id: i,
                        parts: mutateDrawing(parentParts, mutationRate)
                    });
                }
                setOffspring(newOffspring);
            };

            // --- FLUJOS DE NAVEGACIÓN ---
            const finishDraft = () => {
                // Comprobar si al menos tiene cuerpo y cabeza dibujados
                if (organismParts.cuerpo.length === 0 || organismParts.cabeza.length === 0) {
                    alert("Por favor dibuja al menos el Cuerpo y la Cabeza de tu criatura para poder evolucionar.");
                    return;
                }
                setEvolutionHistory([organismParts]);
                generateOffspring(organismParts);
                setGameState('evolve');
            };

            const selectSurvivor = (selectedParts) => {
                const newHistory = [...evolutionHistory, selectedParts];
                setEvolutionHistory(newHistory);
                
                if (newHistory.length >= MAX_GENERATIONS) {
                    setGameState('victory'); // Pantalla final
                } else {
                    generateOffspring(selectedParts);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const startManualEdit = (childParts) => {
                setEditingOrganism(childParts);
                setOrganismParts(JSON.parse(JSON.stringify(childParts))); // Clonación profunda
                setActivePart('cuerpo');
                setGameState('manual_edit');
            };

            const saveManualEdit = () => {
                const newHistory = [...evolutionHistory, organismParts];
                setEvolutionHistory(newHistory);
                
                if (newHistory.length >= MAX_GENERATIONS) {
                    setGameState('victory');
                } else {
                    generateOffspring(organismParts);
                    setGameState('evolve');
                    setEditingOrganism(null);
                }
            };

            const resetToIntro = () => {
                setEvolutionHistory([]);
                setOrganismParts({ cuerpo: [], cabeza: [], ojos: [], boca: [], patas: [], cola: [] });
                setGameState('intro');
            };

            // --- EXTRACCIÓN DE INFORMACIÓN PARA EL REPRODUCTOR DE MORFOSIS ---
            const renderInterpolatedAnimation = () => {
                if (evolutionHistory.length === 0) return null;
                const total = evolutionHistory.length;
                
                // Mapear el playValue a los marcos correspondientes
                const indexA = Math.floor(playValue) % total;
                const indexB = (indexA + 1) % total;
                const progress = playValue - Math.floor(playValue);

                const currentPartsA = evolutionHistory[indexA];
                const currentPartsB = evolutionHistory[indexB];
                
                // Genera el organismo híbrido/intermedio para el frame actual
                const morphParts = interpolateOrganism(currentPartsA, currentPartsB, progress);

                return (
                    <div className="flex flex-col items-center">
                        <div className="w-full max-w-[280px] sm:max-w-[340px] aspect-square bg-slate-900 rounded-3xl p-3 shadow-xl border-4 border-slate-700 relative overflow-hidden">
                            <RenderOrganism parts={morphParts} className="w-full h-full" />
                            
                            {/* Insignia flotante con la generación actual en la animación */}

                                        {/* VISOR DE REPRODUCCIÓN INTERPOLADA (ANIMACIÓN CONTINUA) */}
                                        <div className="bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-750 flex flex-col items-center">
                                            <h3 className="font-bold text-slate-300 text-sm uppercase tracking-wider mb-4">📺 Reproductor de Morfosis Evolutiva</h3>
                                            {renderInterpolatedAnimation()}
                                        </div>

                                        <h3 className="font-bold text-slate-300 text-sm uppercase tracking-wider mb-4">🗂️ Registro de Fósiles Fotograma a Fotograma</h3>
                                        <div className="flex gap-6 overflow-x-auto pb-6 pt-2 items-center snap-x no-scrollbar">
                                            {evolutionHistory.map((organism, idx) => (
                                                <div key={idx} className="flex items-center snap-center shrink-0">
                                                    <div className="bg-white p-3 rounded-2xl w-[220px] md:w-[260px] shadow-2xl border border-slate-200 text-slate-800">
                                                        <div className="text-center font-black text-xs uppercase mb-2 bg-slate-100 py-1.5 rounded-lg text-slate-600">
                                                            {idx === 0 ? 'Ancestro (Gen 0)' : `Generación ${idx}`}
                                                        </div>
                                                        <div className="aspect-square border border-slate-100 rounded-xl bg-slate-50 overflow-hidden">
                                                            <RenderOrganism parts={organism} />
                                                        </div>
                                                    </div>
                                                    {idx !== evolutionHistory.length - 1 && (
                                                        <div className="mx-3 text-emerald-400 text-4xl font-black animate-pulse">➔</div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <div className="mt-6 p-6 bg-slate-700/50 rounded-2xl border border-slate-600 text-sm leading-relaxed max-w-3xl mx-auto text-slate-300">
                                            <h4 className="font-bold text-white text-base mb-2">¿Cómo funciona esta simulación?</h4>
                                            <p className="mb-2">
                                                En la naturaleza, la evolución funciona a través de cambios aleatorios acumulados en el ADN. Al separar el diseño por bloques anatómicos (patas, cabeza, etc.), hemos simulado **mutaciones por secciones**. Al guiar la selección de forma manual o re-editar partes específicas, actúas como la presión ambiental que define el rumbo de la selección de esta nueva especie.
                                            </p>
                                            <p>
                                                El reproductor interactivo de arriba interpola las coordenadas de cada línea para recrear visualmente la morfosis de adaptación que experimentaría la criatura a lo largo de miles de años de evolución acelerada.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- 6. PANTALLA DE VICTORIA (GEN 10 ALCANZADO) --- */}
                            {gameState === 'victory' && (
                                <div className="animate-fade-in space-y-6">
                                    <div className="bg-slate-950 p-6 md:p-10 rounded-3xl shadow-2xl border border-emerald-500 text-white text-center">
                                        <div className="text-7xl mb-4 animate-bounce">🏆🦅🐉</div>
                                        <h2 className="text-3xl md:text-5xl font-black text-emerald-400 mb-2 tracking-tight">¡Éxito Evolutivo Completo!</h2>
                                        <p className="text-slate-400 text-sm md:text-base font-medium mb-8">Has alcanzado el límite de 10 generaciones controlando la mutación adaptativa.</p>

                                        {/* VISOR DE REPRODUCCIÓN INTERPOLADA (ANIMACIÓN CONTINUA EN VICTORIA) */}
                                        <div className="bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-800 flex flex-col items-center">
                                            <h3 className="font-bold text-emerald-400 text-sm uppercase tracking-wider mb-4">📺 Reproductor de Morfosis: Gen 0 a Gen 10</h3>
                                            {renderInterpolatedAnimation()}
                                        </div>
                                        
                                        {/* Comparación Ancestral */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-3xl mx-auto mb-10">
                                            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col items-center">
                                                <h3 className="font-bold text-amber-500 text-xs uppercase tracking-widest mb-2">Ancestro Inicial (Generación 0)</h3>
                                                <div className="aspect-square w-full max-w-[220px] bg-slate-950 rounded-xl overflow-hidden border border-slate-800">
                                                    <RenderOrganism parts={evolutionHistory[0]} />
                                                </div>
                                            </div>
                                            <div className="bg-slate-900 border border-slate-850 rounded-2xl p-4 flex flex-col items-center">
                                                <h3 className="font-bold text-emerald-400 text-xs uppercase tracking-widest mb-2">Especie Adaptada (Generación 10)</h3>
                                                <div className="aspect-square w-full max-w-[220px] bg-slate-950 rounded-xl overflow-hidden border border-slate-800">
                                                    <RenderOrganism parts={evolutionHistory[evolutionHistory.length - 1]} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Resumen Conceptual */}
                                        <div className="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-left max-w-3xl mx-auto mb-8 text-sm md:text-base leading-relaxed text-slate-300">
                                            <h4 className="font-black text-white text-base mb-2">Reflexión Científica</h4>
                                            <p className="mb-4">
                                                Al completar este experimento, has demostrado empíricamente la <strong>Selección Artificial</strong>. Las mutaciones graduales (modificación de pigmentos, escalado de extremidades y la aparición estocástica de manchas o rayas) crearon la materia prima de la variabilidad biológica.
                                            </p>
                                            <p>
                                                Tus decisiones selectivas en cada iteración sirvieron de filtro selectivo, acumulando pequeñas variaciones que condujeron a un organismo morfológica y estéticamente diferente del primero. ¡Esto demuestra cómo cambian las especies en la naturaleza bajo presiones ambientales selectivas!
                                            </p>
                                        </div>

                                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                            <button 
                                                onClick={() => setGameState('history')}
                                                className="px-8 py-3.5 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-all border border-slate-700 text-sm md:text-base"
                                            >
                                                🌳 Ver Línea de Tiempo
                                            </button>
                                            <button 
                                                onClick={resetToIntro}
                                                className="px-8 py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl transition-all shadow-[0_4px_0_rgb(5,150,105)] text-sm md:text-base hover:translate-y-[2px]"
                                            >
                                                🔄 Iniciar Nueva Especie
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
