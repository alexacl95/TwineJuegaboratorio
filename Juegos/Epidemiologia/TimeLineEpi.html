        // AUDIO SINTETIZADO (Web Audio API)
        const playTone = (freq, type, duration) => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = type;
                oscillator.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio no soportado o bloqueado por el navegador");
            }
        };

        const playCorrectSound = () => {
            playTone(523.25, 'sine', 0.15); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.25), 100); // E5

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            // Estados de navegación y configuración
            const [gameState, setGameState] = useState('menu'); // menu, playing, feedback, gameover, victory, tour

                    playTone(293.66, 'sawtooth', 0.5);

                return () => clearTimeout(timerRef.current);

                    maxYear = timeline[slotIndex].year;

                            <button 
                                onClick={() => setShowExitConfirm(true)}
                                className="bg-slate-100 p-2.5 rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-colors border border-slate-100"
                                title="Volver al menú"
                            >
                                🏠
                            </button>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 leading-tight">Epidemiología en el Tiempo</h1>
                                <p className="text-xs font-bold text-indigo-600 uppercase tracking-wider">Actividad Grupal Directiva</p>
                            </div>
                        </div>

                        {/* Estado SIVIGILA */}
                        <div className="flex items-center gap-4 bg-slate-50 border border-slate-200 py-2 px-4 rounded-2xl">
                            <div className="text-left">
                                <span className="block text-[9px] font-black uppercase text-slate-400 tracking-wider">Alerta de Aula SIVIGILA</span>
                                <span className={`text-xs font-black uppercase px-2 py-0.5 rounded-md ${alertStatus.textColor} ${alertStatus.color}`}>
                                    {alertStatus.label}
                                </span>
                            </div>
                            <div className="w-px h-8 bg-slate-200"></div>
                            <div className="text-left">
                                <span className="block text-[9px] font-black uppercase text-slate-400 tracking-wider">Fallos</span>
                                <span className="text-sm font-black text-slate-700">{mistakes} / {maxMistakes}</span>
                            </div>
                        </div>

                        {/* Mazo Restante y Puntos */}
                        <div className="flex gap-4">
                            <div className="text-center bg-slate-50 border border-slate-200 py-1.5 px-3 rounded-xl min-w-[70px]">
                                <span className="block text-[9px] font-black uppercase text-slate-400 tracking-wider">Siguientes</span>
                                <span className="text-base font-black text-indigo-600">{deck.length} hitos</span>
                            </div>
                            <div className="text-center bg-indigo-50 border border-indigo-100 py-1.5 px-3 rounded-xl min-w-[70px]">
                                <span className="block text-[9px] font-black uppercase text-indigo-400 tracking-wider">Puntaje</span>
                                <span className="text-base font-black text-indigo-600">{score} pts</span>
                            </div>
                        </div>
                    </header>

                    {/* Dashboard de juego y debate */}
                    { (isPlaying || isFeedback) && (
                        <div className="w-full grid grid-cols-1 lg:grid-cols-12 gap-8 items-start flex-grow">
                            
                            {/* COLUMNA IZQUIERDA: Carta Objetivo y Debate de Clase */}
                            <div className="lg:col-span-5 space-y-6 lg:sticky lg:top-8">
                                
                                {/* Contenedor de la carta activa */}
                                <div className="bg-white border-2 border-slate-200 rounded-3xl shadow-lg p-6 md:p-8 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-violet-500"></div>
                                    
                                    <div className="flex flex-col items-center gap-2 mb-4">
                                        <span className="inline-block bg-indigo-50 border border-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                                            {isPlaying ? "💬 DEBATIR E INSERTAR" : "📊 ANÁLISIS DE RESULTADO"}
                                        </span>
                                        {/* Badge de Categoría */}
                                        <span className={`px-3 py-0.5 rounded-full text-[10px] font-bold uppercase border tracking-wider ${categoryConfig[activeCard.category].color}`}>
                                            {categoryConfig[activeCard.category].label}
                                        </span>
                                    </div>

                                    {/* Icono de gran formato */}
                                    <div className="w-24 h-24 bg-slate-50 border border-slate-100 rounded-3xl flex items-center justify-center mx-auto mb-6 text-5xl shadow-sm">
                                        {activeCard.icon}
                                    </div>

                                    {/* Título de Hito */}
                                    <h2 className="text-2xl font-black text-slate-800 leading-tight mb-4">
                                        {activeCard.title}
                                    </h2>

                                    {/* Descripción corta */}
                                    <p className="text-slate-500 font-medium text-sm md:text-base leading-relaxed mb-6">
                                        {activeCard.shortDesc}
                                    </p>

                                    {/* Si estamos en feedback, revelar el año y descripción extendida */}
                                    {isFeedback && (
                                        <div className="mt-6 pt-6 border-t border-slate-100 space-y-4 animate-slide-up">
                                            <div>
                                                <span className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Época Confirmada</span>
                                                <span className="inline-block bg-indigo-600 text-white font-black text-3xl py-1 px-6 rounded-2xl shadow-md tracking-wider">
                                                    {activeCard.yearDisplay}
                                                </span>
                                            </div>

                                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-left text-xs md:text-sm text-slate-300 leading-relaxed shadow-inner">
                                                <span className="text-indigo-400 font-bold block mb-1">Impacto e Importancia:</span>
                                                {activeCard.fullDesc}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Botón para avanzar de turno tras feedback ubicado inmediatamente debajo de la carta */}
                                {isFeedback && (
                                    <button 
                                        onClick={advanceTurn}
                                        className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white text-base font-black uppercase tracking-wider rounded-2xl transition-all shadow-lg hover:shadow-emerald-900/20 active:scale-95 flex items-center justify-center gap-2 animate-pulse"
                                    >
                                        Siguiente Hito de Estudio ➔
                                    </button>
                                )}

                                {/* Panel de Control de Debate para el Docente */}
                                <div className="bg-slate-900 border border-slate-800 text-white rounded-3xl p-6 shadow-xl space-y-6">
                                    <div className="flex justify-between items-center border-b border-slate-800 pb-3">
                                        <h3 className="text-xs font-bold tracking-wider uppercase text-slate-400 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                                            Consenso del Grupo
                                        </h3>
                                        <span className="text-xs font-bold text-indigo-400">HERRAMIENTAS DOCENTES</span>
                                    </div>

                                    {/* Reloj de debate */}
                                    <div className="flex items-center justify-between bg-slate-950 p-4 rounded-2xl border border-slate-800">
                                        <div className="flex items-center gap-3">
                                            <span className="text-3xl">⏱️</span>
                                            <div>
                                                <span className="block text-[10px] font-black text-slate-400 uppercase tracking-wider">Tiempo de debate</span>
                                                <span className={`text-2xl font-black font-mono tracking-widest ${timer < 15 ? 'text-rose-500 animate-pulse' : 'text-slate-200'}`}>
                                                    00:{timer < 10 ? `0${timer}` : timer}
                                                </span>
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={toggleTimer}
                                                className={`px-4 py-2 font-black text-xs uppercase rounded-xl transition-all ${
                                                    timerActive ? 'bg-amber-600 hover:bg-amber-500 text-white' : 'bg-indigo-600 hover:bg-indigo-500 text-white'
                                                }`}
                                            >
                                                {timerActive ? 'Pausa' : 'Iniciar'}
                                            </button>
                                            <button 
                                                onClick={resetTimer}
                                                className="bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-xl transition-all text-xs"
                                                title="Reiniciar a 60 segundos"
                                            >
                                                🔄
                                            </button>
                                        </div>
                                    </div>

                                    {/* Zona de anotaciones temporales de la clase */}
                                    <div className="space-y-2">
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-wider">Ideas o hipótesis del grupo</label>
                                        <textarea
                                            value={discussionNote}
                                            onChange={(e) => setDiscussionNote(e.target.value)}
                                            placeholder="Escribe hipótesis de los alumnos aquí... (Ej: 'Votación grupo A: Entre Cólera y Koch')"
                                            className="w-full bg-slate-950 border border-slate-800 focus:border-indigo-500 outline-none p-3 rounded-xl text-xs md:text-sm text-slate-300 font-mono resize-none h-20 placeholder:text-slate-700"
                                        />
                                    </div>
                                </div>

                            </div>

                            {/* COLUMNA DERECHA: Línea de tiempo interactiva vertical */}
                            <div className="lg:col-span-7 space-y-4">
                                <div className="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-sm">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 border-b border-slate-100 pb-3">
                                        Línea del Tiempo Actual
                                    </h3>

                                    <div className="relative pl-6 md:pl-10 space-y-6">
                                        
                                        {/* Línea divisora central vertical */}
                                        <div className="absolute left-10 md:left-14 top-4 bottom-4 w-1 bg-gradient-to-b from-indigo-200 via-slate-200 to-indigo-200 -translate-x-1/2"></div>

                                        {/* Primera ranura (Al inicio de los tiempos) */}
                                        {isPlaying && (
                                            <div className="relative z-20 flex justify-center -ml-6 md:-ml-10">
                                                <button
                                                    onClick={() => handleSlotSelect(0)}
                                                    className="bg-indigo-50 hover:bg-indigo-600 hover:text-white text-indigo-700 border-2 border-dashed border-indigo-300 hover:border-solid hover:border-indigo-700 py-2.5 px-6 rounded-2xl text-xs font-black uppercase tracking-widest transition-all shadow-sm animate-pulse-border flex items-center gap-2"
                                                >
                                                    ➕ Insertar antes de {timeline[0].yearDisplay}
                                                </button>
                                            </div>
                                        )}

                                        {/* Renderizado secuencial de tarjetas en la línea de tiempo */}
                                        {timeline.map((item, index) => {
                                            const isActiveResult = isFeedback && item.id === activeCard.id;
                                            
                                            return (
                                                <React.Fragment key={`group-${item.id}`}>
                                                    
                                                    {/* Tarjeta de hito colocado */}
                                                    <div className="relative z-10 flex items-start gap-4 md:gap-6 animate-slide-up" style={{ animationDelay: `${index * 0.05}s` }}>
                                                        
                                                        {/* Nodo indicador de año */}
                                                        <div className={`w-24 md:w-28 shrink-0 py-2 text-center rounded-2xl border font-mono tracking-tight font-black shadow-sm ${
                                                            isActiveResult 
                                                            ? 'bg-indigo-600 border-indigo-700 text-white scale-110 shadow-indigo-200' 
                                                            : 'bg-slate-100 border-slate-200 text-slate-700'
                                                        }`}>
                                                            <div className="text-[10px] uppercase text-slate-400 font-bold tracking-wider leading-none mb-1">AÑO</div>
                                                            <div className="text-xs md:text-sm">{item.yearDisplay}</div>
                                                        </div>

                                                        {/* Cuerpo de la Tarjeta colocada */}
                                                        <div className={`flex-1 p-4 md:p-5 rounded-2xl border transition-all ${
                                                            isActiveResult
                                                            ? (lastTurnResult === 'correct' 
                                                                ? 'bg-emerald-50 border-emerald-400 ring-2 ring-emerald-400/20 shadow-emerald-50' 
                                                                : 'bg-rose-50 border-rose-400 ring-2 ring-rose-400/20 shadow-rose-50')
                                                            : 'bg-white border-slate-200 shadow-sm'
                                                        }`}>
                                                            <div className="flex flex-col gap-2">
                                                                <div className="flex items-start justify-between gap-3">
                                                                    <div className="flex items-start gap-3">
                                                                        <span className="text-2xl md:text-3xl">{item.icon}</span>
                                                                        <div>
                                                                            <h4 className="font-extrabold text-slate-800 text-sm md:text-base leading-tight mb-1">
                                                                                {item.title}
                                                                            </h4>
                                                                            <p className="text-slate-500 font-medium text-xs md:text-sm">
                                                                                {item.shortDesc}
                                                                            </p>
                                                                        </div>
                                                                    </div>
                                                                    {/* Categoría Badge */}
                                                                    <span className={`shrink-0 px-2 py-0.5 rounded-full text-[9px] font-bold uppercase border tracking-wider h-fit ${categoryConfig[item.category].color}`}>
                                                                        {categoryConfig[item.category].label}
                                                                    </span>
                                                                </div>

                                                                {/* Feedback contextual de corrección */}
                                                                {isActiveResult && (
                                                                    <div className={`mt-2 py-1.5 px-3 rounded-lg text-xs font-black uppercase tracking-wider text-center ${
                                                                        lastTurnResult === 'correct' 
                                                                        ? 'bg-emerald-100 text-emerald-800' 
                                                                        : 'bg-rose-100 text-rose-800'
                                                                    }`}>
                                                                        {lastTurnResult === 'correct' ? '✅ ¡Ubicación Correcta!' : '❌ ¡Ubicación Errónea! (Se reubicó aquí)'}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Ranura de inserción interactiva entre cartas */}
                                                    {isPlaying && (
                                                        <div className="relative z-20 flex justify-center -ml-6 md:-ml-10">
                                                            <button
                                                                onClick={() => handleSlotSelect(index + 1)}
                                                                className="bg-indigo-50 hover:bg-indigo-600 hover:text-white text-indigo-700 border-2 border-dashed border-indigo-300 hover:border-solid hover:border-indigo-700 py-2 px-5 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-widest transition-all shadow-sm animate-pulse-border flex items-center gap-2"
                                                            >
                                                                ➕ Insertar después de {item.yearDisplay}
                                                            </button>
                                                        </div>
                                                    )}
                                                </React.Fragment>
                                            );
                                        })}

                                    </div>
                                </div>
                            </div>

                        </div>
                    )}

                    {/* VISTA 5: SISTEMA SANITARIO COLAPSADO (GAME OVER) */}
                    {gameState === 'gameover' && (
                        <div className="min-h-[70vh] flex items-center justify-center p-4">
                            <div className="bg-white border-2 border-rose-300 p-8 md:p-12 rounded-3xl shadow-2xl max-w-md w-full text-center animate-slide-up">
                                <div className="text-7xl mb-4">🚨</div>
                                <h2 className="text-xs font-bold text-rose-500 uppercase tracking-widest mb-2">Simulación Fallida</h2>
                                <h1 className="text-3xl font-black text-slate-800 mb-4">Alerta Sanitaria Crítica</h1>
                                <p className="text-slate-500 font-medium mb-6">
                                    Se ha superado el máximo de errores permitidos por el sistema de monitoreo. La epidemia se ha propagado de forma incontrolable debido a decisiones de sincronización erróneas.
                                </p>

                                <div className="bg-rose-50 border border-rose-100 rounded-2xl p-4 mb-8">
                                    <div className="text-[10px] font-bold text-rose-400 uppercase tracking-wider mb-1">Métricas Finales</div>
                                    <div className="text-4xl font-black text-rose-600">{score} <span className="text-xs text-rose-400 font-medium">puntos</span></div>
                                </div>

                                <button 
                                    onClick={() => setGameState('menu')}
                                    className="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white font-bold uppercase rounded-xl transition-all shadow-md flex items-center justify-center gap-2"
                                >
                                    🏠 Volver al Menú
                                </button>
                            </div>
                        </div>
                    )}

                    {/* VISTA 6: VICTORIA EPIDEMIOLÓGICA */}
                    {gameState === 'victory' && (
                        <div className="min-h-[70vh] flex items-center justify-center p-4">
                            <div className="bg-white border-2 border-emerald-300 p-8 md:p-12 rounded-3xl shadow-2xl max-w-md w-full text-center animate-slide-up">
                                <div className="text-7xl mb-4">🏆</div>
                                <h2 className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2">Simulación Completada</h2>
                                <h1 className="text-3xl font-black text-slate-800 mb-4">Sincronización Total</h1>
                                <p className="text-slate-500 font-medium mb-6">
                                    ¡Excelente trabajo cooperativo! El aula ha resuelto la línea temporal de la historia de la salud pública, controlando las amenazas epidemiológicas y manteniendo el nivel de alerta estable.
                                </p>

                                <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 mb-8">
                                    <div className="text-[10px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Puntuación de Aula</div>
                                    <div className="text-5xl font-black text-emerald-600">{score} <span className="text-xs text-emerald-400 font-medium">puntos</span></div>
                                </div>

                                <button 
                                    onClick={() => setGameState('menu')}
                                    className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold uppercase rounded-xl transition-all shadow-md flex items-center justify-center gap-2"
                                >
                                    🏠 Reintentar otra Simulación
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MODAL PERSONALIZADO DE CONFIRMACIÓN DE SALIDA */}
                    {showExitConfirm && (
                        <div className="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 md:p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl animate-slide-up border border-slate-100">
                                <div className="text-5xl mb-4">🚪</div>
                                <h3 className="text-lg font-black text-slate-800 mb-2">¿Detener Simulación?</h3>
                                <p className="text-slate-500 text-sm mb-6">
                                    Perderás el progreso de la partida actual y volverás a la pantalla de configuración.
                                </p>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setShowExitConfirm(false)}
                                        className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setShowExitConfirm(false);
                                            setGameState('menu');
                                        }}
                                        className="flex-1 py-3 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl transition-colors text-sm shadow-md shadow-rose-600/10"
                                    >
                                        Sí, salir
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
