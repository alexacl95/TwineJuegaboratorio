    <style>
        body { 
            background-color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Cuadrícula clara */
        .bg-grid-pattern { 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); 
            background-size: 24px 24px; 
            background-color: #f8fafc;
        }

        /* Estilos del grafo y conexiones */
        .tree-line {
            transition: stroke 0.3s ease, stroke-width 0.3s ease;
        }

        /* Bucle de error amarillo (Dragón) */
        .loop-active {
            animation: loopPulseYellow 1s infinite alternate;
        }

        @keyframes loopPulseYellow {
            0% { opacity: 0.6; stroke: #eab308; }
            100% { opacity: 1; stroke: #fef08a; }
        }

        .node-box {
            position: absolute;
            z-index: 20;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        /* Utilidades para scroll táctil */
        .scroll-smooth-mobile {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>

        const SVGConnections = ({ history, unlockedHistories, isLooping }) => {
            const isPathInCurrent = (from, to) => {
                for (let i = 0; i < history.length - 1; i++) {
                    if (String(history[i]) === String(from) && String(history[i+1]) === String(to)) return true;
                }
                return false;
            };

            const isPathInUnlocked = (from, to) => {
                for (const h of unlockedHistories) {
                    for (let i = 0; i < h.length - 1; i++) {
                        if (String(h[i]) === String(from) && String(h[i+1]) === String(to)) return true;
                    }
                }
                return false;
            };

            const getLineColor = (from, to, activeCurrent) => {
                const pathKey = `${from}-${to}`;
                const yesPaths = ['1-2', '2-3', '3-pato', '4-5', '5-nutria'];
                
                // Dragón (Amarillo)
                if (to === 'dragon' || from === 'dragon') {
                    return { color: activeCurrent ? '#eab308' : '#fef08a' }; // Yellow
                }
                // SÍ (Verde)
                if (yesPaths.includes(pathKey)) {
                    return { color: activeCurrent ? '#22c55e' : '#bbf7d0' }; // Green
                }
                // NO (Rojo)
                return { color: activeCurrent ? '#ef4444' : '#fecaca' }; // Red
            };

            const drawCircuitLine = (from, to, type="normal") => {
                if (!points[from] || !points[to]) return null;
                
                const activeCurrent = isPathInCurrent(from, to);
                const activeUnlocked = isPathInUnlocked(from, to);
                const visible = activeCurrent || activeUnlocked;

                if (!visible) return null;

                const width = activeCurrent ? "4" : "2"; 
                const { color } = getLineColor(from, to, activeCurrent);

                const [x1, y1] = points[from];
                const [x2, y2] = points[to];

                // Línea de Bucle (Dragón conectando con curva amplia por la izquierda hacia el inicio)
                if (type === "loop") {
                    const loopClass = (activeCurrent && isLooping) ? "loop-active tree-line" : "tree-line opacity-50";
                    return (
                        <path 
                            key={`loop-${from}-${to}`}
                            d={`M ${x1} ${y1} C 5 ${y1}, 5 10, ${x2} 10`}
                            stroke={color} 
                            strokeWidth={width} 
                            fill="none"
                            strokeDasharray="6,6" 
                            vectorEffect="non-scaling-stroke"
                            className={loopClass} 
                        />
                    );
                }

                // Línea Curvada Bézier suave estándar
                const midY = (y1 + y2) / 2;
                return (
                    <path 
                        key={`line-${from}-${to}`} 
                        className="tree-line animate-fade-in"
                        d={`M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`}
                        stroke={color} 
                        strokeWidth={width} 
                        fill="none"
                        vectorEffect="non-scaling-stroke"
                    />
                );
            };

            return (
                <div className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}>
                    <svg className="w-full h-full overflow-visible" viewBox="0 0 100 100" preserveAspectRatio="none">
                        {drawCircuitLine(1, 2)}
                        {drawCircuitLine(1, 4)}
                        {drawCircuitLine(2, 3)}
                        {drawCircuitLine(2, 'dragon')}
                        {drawCircuitLine(3, 'pato')}
                        {drawCircuitLine(3, 'aguila')}
                        {drawCircuitLine(4, 5)}
                        {drawCircuitLine(4, 'roca')}
                        {drawCircuitLine(5, 'nutria')}
                        {drawCircuitLine(5, 'hipopotamo')}
                        {drawCircuitLine('dragon', 1, "loop")}
                    </svg>
                </div>
            );
        };

            const [showAdaptation, setShowAdaptation] = useState(false);
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [speciesLockAlert, setSpeciesLockAlert] = useState(false);

            const scrollContainerRef = useRef(null);

            useEffect(() => {
                if (gameState === 'playing' && scrollContainerRef.current) {
                    const container = scrollContainerRef.current;
                    container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2;
                }
            }, [gameState]);

            const startGame = () => {
                setGameState('playing');
                setCurrentNode(1);
                setHistory([1]);
                setFinalResult(null);
            };

            const handleAnswer = (answer) => {
                const nodeData = LOGIC_FLOW.nodes[currentNode];
                const nextNode = nodeData.paths[answer];

                if (!nextNode) return;

                const newHistory = [...history, nextNode];
                setHistory(newHistory);

                if (LOGIC_FLOW.results[nextNode]) {
                    setCurrentNode(nextNode);
                    const resultData = LOGIC_FLOW.results[nextNode];
                    
                    setUnlockedAnimals(prev => prev.includes(nextNode) ? prev : [...prev, nextNode]);
                    
                    setUnlockedHistories(prev => {
                        const exists = prev.some(h => h.join(',') === newHistory.join(','));
                        return exists ? prev : [...prev, newHistory];
                    });

                    if (resultData.isLoop) {
                        setGameState('looping');
                    } else {
                        setFinalResult(resultData);
                        setGameState('result');
                    }
                } else {
                    setCurrentNode(nextNode);
                }
            };

            const handleContinueLoop = () => {
                setHistory(prev => [...prev, 1]);
                setCurrentNode(1);
                setGameState('playing');
            };

            const handleBack = () => {
                if (history.length <= 1 || gameState === 'looping') return;
                
                let newHistory = [...history];
                newHistory.pop(); 
                
                let previousNode = newHistory[newHistory.length - 1];
                
                if (previousNode === 'dragon') {
                    newHistory.pop();
                    previousNode = newHistory[newHistory.length - 1];
                }
                
                setHistory(newHistory);
                setCurrentNode(previousNode);
                setGameState('playing');
                setFinalResult(null);
            };

            const handleNextCard = () => {
                setShowAdaptation(false);
                setSpeciesLockAlert(false);
                let nextIndex;
                do {
                    nextIndex = Math.floor(Math.random() * ADVERSE_CARDS.length);
                } while (nextIndex === activeCardIndex && ADVERSE_CARDS.length > 1);
                setActiveCardIndex(nextIndex);
            };

            const handleSpeciesSelect = (key) => {
                setSelectedSpecies(key);
                setShowAdaptation(false);
                setSpeciesLockAlert(false);
            };

            const handleCompile = () => {
                // Verificar si la especie ya fue desbloqueada en el circuito lógico
                const isUnlocked = unlockedAnimals.includes(selectedSpecies);
                if (!isUnlocked) {
                    setSpeciesLockAlert(true);
                    setShowAdaptation(false);
                    return;
                }
                setSpeciesLockAlert(false);
                setShowAdaptation(true);
            };

            const handleConfirmExit = () => {
                setGameState('menu');
                setShowExitConfirm(false);
            };

            const isNodeCurrent = (id) => currentNode === id;
            
            // Cajas de Estaciones (Mantiene el tema claro original)
            const renderStation = (id, top, left) => {
                const node = LOGIC_FLOW.nodes[id];
                if (!node) return null;
                
                const inCurrentPath = history.includes(id);
                const inUnlockedPath = unlockedHistories.some(h => h.includes(id));
                const current = isNodeCurrent(id);
                
                if (!inCurrentPath && !inUnlockedPath && !current) return null;

                let boxClass = `node-box border-2 rounded-xl px-2 py-1.5 md:px-3 md:py-2 text-center w-[120px] md:w-[150px] animate-fade-in transition-all duration-300 `;
                
                if (current) {
                    boxClass += "bg-white border-blue-500 shadow-[0_0_0_4px_rgba(59,130,246,0.2)] z-30 scale-105 ";
                } else if (inCurrentPath) {
                    boxClass += "bg-white border-slate-400 shadow-md z-20 ";
                } else if (inUnlockedPath) {
                    boxClass += "bg-slate-50 border-slate-300 opacity-70 z-10 ";
                }

                return (
                    <div key={`station-${id}`} className={boxClass} style={{ top: `${top}%`, left: `${left}%` }}>
                        {node.operator && (
                            <div className="flex justify-center mb-1">
                                <span className={`text-[10px] md:text-xs font-black px-1.5 py-0.5 rounded leading-none ${
                                    inCurrentPath ? 'bg-slate-200 text-slate-700' : 'bg-slate-100 text-slate-500'
                                }`}>
                                    {node.conditions.join(` ${node.operator} `)}
                                </span>
                            </div>
                        )}
                        {!node.operator && (
                            <div className={`text-sm md:text-base font-black leading-tight ${
                                inCurrentPath ? 'text-slate-800' : 'text-slate-500'
                            }`}>
                                {node.conditions[0]}
                            </div>
                        )}
                    </div>
                );
            };

            // Cajas de Resultados (Mantiene el tema claro original)
            const renderResultBox = (id, top, left) => {
                const result = LOGIC_FLOW.results[id];
                const inCurrentPath = history.includes(id);
                const isUnlocked = unlockedAnimals.includes(id);
                
                if (!inCurrentPath && !isUnlocked) {
                    return null; 
                }

                const isError = result.isError || result.isLoop;
                
                let boxClass = "node-box border-2 md:border-4 rounded-xl px-1 py-2 md:p-3 text-center w-[95px] md:w-[130px] animate-fade-in transition-all duration-300 ";

                if (inCurrentPath) {
                    if (isError) boxClass += "bg-white border-amber-500 shadow-lg scale-105 z-30 ";
                    else boxClass += "bg-white border-emerald-500 shadow-lg scale-105 z-30 ";
                } else {
                    boxClass += "bg-slate-50 border-slate-300 opacity-60 scale-95 z-10 ";
                }

                return (
                    <div key={`result-${id}`} className={boxClass} style={{ top: `${top}%`, left: `${left}%` }}>
                        <div className={`text-4xl md:text-5xl mb-1 leading-none drop-shadow-sm ${!inCurrentPath ? 'grayscale' : ''}`}>{result.emoji}</div>
                        <div className={`font-black text-xs md:text-base leading-tight tracking-tight ${inCurrentPath ? (isError ? 'text-amber-600' : 'text-emerald-600') : 'text-slate-500'}`}>
                            {result.animal}
                        </div>
                        <div className={`text-[9px] md:text-xs font-bold uppercase mt-1 leading-tight ${inCurrentPath ? 'text-slate-500' : 'text-slate-400'}`}>
                            {result.eco}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full bg-slate-50 flex flex-col relative overflow-hidden">
                    
                    {/* CABECERA PRINCIPAL CON SELECTOR DE PESTAÑAS (Integración de cartas) */}
                    <header className="bg-white border-b border-slate-200 px-4 py-3 shrink-0 flex flex-col sm:flex-row items-center justify-between shadow-sm z-30 gap-3">
                        <div className="flex items-center gap-3">
                            <span className="text-2xl md:text-3xl">🇨🇴</span>
                            <div>
                                <h1 className="text-sm md:text-base font-black text-slate-800 uppercase tracking-tight leading-none">Ecosistemas Colombia</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-wider font-bold mt-0.5">Biodiversity Battle & Logic Circuit</p>
                            </div>
                        </div>

                        {/* Pestañas Interactivas */}
                        <div className="bg-slate-100 p-1 rounded-xl flex gap-1 border border-slate-200 shrink-0">
                            <button 
                                onClick={() => setActiveTab('circuit')}
                                className={`px-4 py-2 text-xs md:text-sm font-black rounded-lg transition-all ${activeTab === 'circuit' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                🕹️ Circuito Lógico
                            </button>
                            <button 
                                onClick={() => setActiveTab('battle')}
                                className={`px-4 py-2 text-xs md:text-sm font-black rounded-lg transition-all ${activeTab === 'battle' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                🔥 Batalla Ecológica
                            </button>
                        </div>
                    </header>

                    {/* SECCIÓN 1: PESTAÑA CIRCUITO LÓGICO */}
                    {activeTab === 'circuit' && (
                        <div className="flex-grow flex flex-col h-full overflow-hidden">
                            {gameState === 'menu' ? (
                                <div className="min-h-0 flex-grow bg-slate-100 p-4 md:p-8 font-sans bg-grid-pattern flex flex-col items-center justify-center overflow-auto relative">
                                    <div className="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-6 md:p-10 text-center animate-fade-in my-8 z-10 w-full max-w-xl relative overflow-hidden">
                                        <div className="text-6xl mb-6">🤖🌳</div>
                                        <h1 className="text-3xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">Circuito Lógico</h1>
                                        <h2 className="text-lg md:text-xl text-slate-500 font-bold mb-8 uppercase tracking-widest">Algoritmo y Robot Humano</h2>
                                        
                                        <p className="text-slate-600 mb-10 text-base md:text-lg leading-relaxed">
                                            Recorre el árbol de decisiones. Responde a las condiciones lógicas (<span className="font-bold text-indigo-600">AND</span> / <span className="font-bold text-amber-500">OR</span>) en cada estación para descubrir la clasificación del animal y su ecosistema.
                                        </p>

                                        <button

                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg md:text-xl py-4 rounded-xl shadow-[0_4px_0_rgb(67,56,202)] hover:shadow-[0_2px_0_rgb(67,56,202)] transition-all hover:translate-y-[2px]"
                                        >
                                            Iniciar Sistema ▶
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-grow flex flex-col h-full overflow-hidden">
                                    {/* BARRA INTERNA DE NAVEGACIÓN CIRCUITO */}
                                    <div className="bg-white border-b border-slate-100 p-3 flex justify-between items-center z-10 relative shrink-0 shadow-sm">
                                        <button 
                                            onClick={handleBack}
                                            disabled={history.length <= 1 || gameState === 'looping'}
                                            className={`font-bold px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1 md:gap-2 text-xs border ${
                                                history.length > 1 && gameState !== 'looping' 
                                                ? 'bg-slate-100 text-slate-700 hover:bg-slate-200 border-slate-300' 
                                                : 'bg-transparent text-slate-400 border-transparent cursor-not-allowed'

                                        >
                                            ⬅ Atrás
                                        </button>
                                        
                                        <div className="text-center font-black text-indigo-700 text-sm md:text-base">
                                            {gameState === 'playing' ? `Estación actual: ${currentNode}` : 'Resultado final del análisis'}

                                        <button 
                                            onClick={() => setShowExitConfirm(true)}

                                        >
                                            Salir al menú
                                        </button>
                                    </div>

                                    {/* ÁREA DEL TABLERO GRÁFICO */}
                                    <div ref={scrollContainerRef} className="flex-grow overflow-auto bg-slate-50 scroll-smooth-mobile relative">
                                        <div className="relative bg-grid-pattern min-w-[800px] w-full h-[500px] md:min-h-[550px] mx-auto">
                                            <SVGConnections history={history} unlockedHistories={unlockedHistories} isLooping={gameState === 'looping'} />
                                            
                                            {renderStation(1, points[1][1], points[1][0])}
                                            {renderStation(2, points[2][1], points[2][0])}
                                            {renderStation(4, points[4][1], points[4][0])}
                                            {renderStation(3, points[3][1], points[3][0])}
                                            {renderStation(5, points[5][1], points[5][0])}
                                            
                                            {renderResultBox('dragon', points['dragon'][1], points['dragon'][0])}
                                            {renderResultBox('roca', points['roca'][1], points['roca'][0])}

                                            {renderResultBox('pato', points['pato'][1], points['pato'][0])}
                                            {renderResultBox('aguila', points['aguila'][1], points['aguila'][0])}
                                            {renderResultBox('nutria', points['nutria'][1], points['nutria'][0])}
                                            {renderResultBox('hipopotamo', points['hipopotamo'][1], points['hipopotamo'][0])}
                                        </div>
                                    </div>

                                    {/* PANEL DE INTERACCIÓN INFERIOR CIRCUITO */}
                                    <div className="bg-white border-t border-slate-200 p-4 md:p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-20 relative shrink-0 min-h-[180px] flex flex-col justify-center">
                                        
                                        {gameState === 'playing' && LOGIC_FLOW.nodes[currentNode] && (
                                            <div className="max-w-2xl mx-auto w-full text-center animate-fade-in">
                                                <p className="text-xl md:text-3xl font-black text-slate-800 mb-6 md:mb-8 leading-tight">
                                                    {LOGIC_FLOW.nodes[currentNode].question}
                                                </p>
                                                
                                                <div className="flex justify-center gap-4 md:gap-8">
                                                    <button 
                                                        onClick={() => handleAnswer('yes')}
                                                        className="flex-1 max-w-[150px] md:max-w-[180px] bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg md:text-xl py-3 md:py-4 rounded-xl shadow-[0_4px_0_rgb(5,150,105)] hover:shadow-[0_2px_0_rgb(5,150,105)] transition-all hover:translate-y-[2px]"
                                                    >
                                                        SÍ
                                                    </button>
                                                    <button 
                                                        onClick={() => handleAnswer('no')}
                                                        className="flex-1 max-w-[150px] md:max-w-[180px] bg-rose-500 hover:bg-rose-600 text-white font-black text-lg md:text-xl py-3 md:py-4 rounded-xl shadow-[0_4px_0_rgb(225,29,72)] hover:shadow-[0_2px_0_rgb(225,29,72)] transition-all hover:translate-y-[2px]"
                                                    >
                                                        NO
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {gameState === 'looping' && (
                                            <div className="text-center animate-fade-in w-full max-w-2xl mx-auto">
                                                <div className="text-5xl md:text-6xl mb-2 drop-shadow-md">🌀</div>
                                                <div className="font-black text-lg md:text-xl text-amber-600 mb-4 tracking-wider">¡BUCLE INFINITO DETECTADO!</div>
                                                
                                                <div className="flex flex-wrap justify-center gap-2 mb-6">
                                                    {Object.entries(LOGIC_FLOW.results['dragon'].traits).map(([k, v]) => (
                                                        <div key={k} className="bg-amber-50 px-2 py-1 rounded-lg border border-amber-200">
                                                            <span className="text-[10px] uppercase font-bold text-amber-500 mr-1">{k}:</span>
                                                            <span className="text-xs font-black text-amber-700">{v}</span>
                                                        </div>
                                                    ))}
                                                </div>

                                                <button 
                                                    onClick={handleContinueLoop}
                                                    className="px-6 py-2 md:py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-black transition-all shadow-[0_4px_0_rgb(217,119,6)] hover:shadow-[0_2px_0_rgb(217,119,6)] hover:translate-y-[2px]"
                                                >
                                                    🔄 Continuar (Volver al inicio)
                                                </button>
                                            </div>
                                        )}

                                        {gameState === 'result' && finalResult && (
                                            <div className="text-center animate-fade-in w-full max-w-2xl mx-auto">
                                                <div className="text-5xl md:text-6xl mb-2 md:mb-4 drop-shadow-sm">{LOGIC_FLOW.results[currentNode].emoji}</div>
                                                <div className={`text-lg md:text-xl font-black ${finalResult.isError ? 'text-amber-600' : 'text-emerald-600'}`}>
                                                    {finalResult.isRock ? 'Felicidades, eres: ' : '¡Descubriste un '} {LOGIC_FLOW.results[currentNode].animal}!
                                                </div>
                                                <p className="text-xs md:text-sm text-slate-500 font-bold mb-4 uppercase tracking-widest">
                                                    Ecosistema: <span className="text-slate-800">{LOGIC_FLOW.results[currentNode].eco}</span>
                                                </p>

                                                <div className="flex flex-wrap justify-center gap-2 mb-6">
                                                    {Object.entries(LOGIC_FLOW.results[currentNode].traits).map(([k, v]) => (
                                                        <div key={k} className="bg-indigo-50 px-2 py-1 rounded-lg border border-indigo-100">
                                                            <span className="text-[10px] uppercase font-bold text-indigo-400 mr-1">{k}:</span>
                                                            <span className="text-xs font-black text-indigo-700">{v}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                {finalResult.isRock && <p className="mb-4 text-xs sm:text-sm text-slate-500 font-medium italic max-w-sm mx-auto">No vuela, no nada, no tiene plumas, ni pelo... ¡Definitivamente es una roca! 🪨 Una mascota excelente.</p>}

                                                {/* Descubrimientos */}
                                                <div className="mb-4 bg-slate-50 border border-slate-100 rounded-xl p-3 max-w-sm mx-auto">
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-2">Base de Datos</p>
                                                    <div className="flex justify-center gap-2 mb-1 flex-wrap">
                                                        {['pato', 'aguila', 'nutria', 'hipopotamo', 'dragon', 'roca'].map(animalKey => {
                                                            const isUnlocked = unlockedAnimals.includes(animalKey);
                                                            const animalData = LOGIC_FLOW.results[animalKey];
                                                            return (
                                                                <div 
                                                                    key={animalKey} 
                                                                    className={`flex flex-col items-center p-2 rounded-lg transition-all ${isUnlocked ? 'bg-white border border-slate-200 shadow-sm' : 'opacity-40 grayscale'}`} 
                                                                    title={isUnlocked ? animalData.animal : 'Desconocido'}
                                                                >
                                                                    <div className="text-2xl md:text-3xl leading-none mb-1">{isUnlocked ? animalData.emoji : '❓'}</div>
                                                                    <div className="text-[10px] font-bold text-slate-600">{isUnlocked ? animalData.animal : '???'}</div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                    <p className="text-[10px] font-bold text-indigo-600 mt-2">
                                                        {unlockedAnimals.filter(a => ['pato', 'aguila', 'nutria', 'hipopotamo', 'dragon', 'roca'].includes(a)).length} de 6 finales encontrados
                                                    </p>
                                                </div>

                                                <button 
                                                    onClick={() => {setGameState('playing'); setCurrentNode(1); setHistory([1]);}} 
                                                    className="mt-2 px-6 py-2 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all shadow-[0_4px_0_rgb(67,56,202)] hover:shadow-[0_2px_0_rgb(67,56,202)] hover:translate-y-[2px] w-full sm:w-auto"
                                                >
                                                    🔍 Analizar otra ruta
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* SECCIÓN 2: PESTAÑA DE BIODIVERSITY BATTLE (COLOMBIA) */}
                    {activeTab === 'battle' && (
                        <div className="flex-grow flex flex-col md:flex-row overflow-hidden bg-grid-pattern relative p-4 md:p-8 gap-6 md:gap-8 h-full">
                            
                            {/* Columna Izquierda: Carta de Evento Ecológico Colombiano */}
                            <div className="flex-1 flex flex-col justify-center items-center">
                                <div className="bg-white border-2 border-slate-200 shadow-xl rounded-3xl p-6 md:p-8 max-w-md w-full relative overflow-hidden flex flex-col justify-between h-[340px] md:h-[400px]">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 via-amber-500 to-indigo-500"></div>
                                    
                                    <div>
                                        <div className="flex justify-between items-start mb-4">
                                            <span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full border border-indigo-100 uppercase tracking-wider">
                                                🚨 Evento Adverso
                                            </span>
                                            <span className="text-3xl">{ADVERSE_CARDS[activeCardIndex].icon}</span>
                                        </div>
                                        
                                        <h3 className="text-xl md:text-2xl font-black text-slate-800 mb-1 leading-tight">
                                            {ADVERSE_CARDS[activeCardIndex].title}
                                        </h3>
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                                            📍 {ADVERSE_CARDS[activeCardIndex].ecosystem}
                                        </p>
                                        
                                        <p className="text-xs md:text-sm text-slate-600 leading-relaxed italic animate-fade-in" key={activeCardIndex}>
                                            "{ADVERSE_CARDS[activeCardIndex].desc}"
                                        </p>
                                    </div>

                                    <button 
                                        onClick={handleNextCard}
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-md transition-all active:scale-95"

                                        🎲 Siguiente Evento Colombiano
                                    </button>
                                </div>
                            </div>

                            {/* Columna Derecha: Lógica de Adaptación de la Especie (Pseudocódigo) */}
                            <div className="flex-grow md:max-w-md flex flex-col h-full bg-white border-2 border-slate-200 rounded-3xl shadow-xl p-5 md:p-8 overflow-hidden z-10">
                                <h3 className="text-base md:text-lg font-black text-slate-800 uppercase tracking-tight mb-4 border-b border-slate-100 pb-3 flex items-center justify-between">
                                    <span>🧬 Respuesta Lógica</span>
                                    <span className="text-xs text-indigo-600 font-bold uppercase">{unlockedAnimals.length} Desbloqueados</span>
                                </h3>

                                <div className="space-y-4 flex-grow flex flex-col justify-between overflow-hidden">
                                    
                                    {/* Selector de Especie de la Base de Datos */}
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-slate-400 block mb-2 tracking-wider">Selecciona la especie para evaluar</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['pato', 'aguila', 'nutria', 'hipopotamo', 'dragon', 'roca'].map(key => {

                                                const isUnlocked = unlockedAnimals.includes(key);

                                                <button
                                                    onClick={handleCompile}
                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 py-2.5 rounded-xl text-xs uppercase shadow-md transition-transform active:scale-95"
                                                >
                                                    Evaluar Adaptación
                                                </button>
                                            </div>
                                        )}

                                        {/* Estado de Alerta: Especie no desbloqueada (Sustituto de alert nativo) */}
                                        {speciesLockAlert && (
                                            <div className="text-center py-4 animate-fade-in">
                                                <div className="text-4xl mb-2">🔒</div>
                                                <h4 className="text-xs font-black text-rose-600 uppercase tracking-wider mb-1">Especie Bloqueada</h4>
                                                <p className="text-[11px] text-slate-500 max-w-xs mx-auto mb-4">
                                                    Debes clasificar a esta especie primero completando su ruta en el <b>Circuito Lógico</b> antes de simular su resiliencia aquí.
                                                </p>
                                                <button
                                                    onClick={() => setActiveTab('circuit')}
                                                    className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg text-xs uppercase"
                                                >
                                                    Ir al Circuito
                                                </button>
                                            </div>
                                        )}

                                        {/* Estado Activo: Pseudocódigo estructurado */}
                                        {showAdaptation && (
                                            <div className="space-y-3 animate-fade-in h-full flex flex-col justify-center">
                                                <div className="flex items-center gap-2 mb-2 border-b border-slate-200 pb-2">
                                                    <span className="text-2xl">{LOGIC_FLOW.results[selectedSpecies].emoji}</span>
                                                    <div>
                                                        <h4 className="text-xs font-black text-slate-800">{LOGIC_FLOW.results[selectedSpecies].animal}</h4>
                                                        <p className="text-[9px] text-indigo-500 uppercase font-black">Pseudocódigo de respuesta biológica</p>
                                                    </div>
                                                </div>

                                                <div className="space-y-2 text-[11px] font-mono leading-tight">
                                                    {ADVERSE_CARDS[activeCardIndex].adaptationLogic[selectedSpecies] ? (
                                                        ADVERSE_CARDS[activeCardIndex].adaptationLogic[selectedSpecies].map((logic, idx) => (
                                                            <div key={idx} className="bg-white border border-slate-200 p-2 rounded-lg shadow-sm">
                                                                <div className="text-red-500 font-bold mb-0.5">{logic.step}</div>
                                                                <div className="text-slate-700">{logic.result}</div>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <div className="bg-white border border-slate-200 p-2 rounded-lg shadow-sm text-slate-400 italic">
                                                            No se encontraron reglas biológicas de adaptación para esta especie.
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}

                                    </div>

                                </div>
                            </div>

                        </div>
                    )}

                    {/* MODAL DE CONFIRMACIÓN DE SALIDA (Para evitar confirm() nativo de JS) */}
                    {showExitConfirm && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-2xl p-6 max-w-sm w-full text-center">
                                <div className="text-4xl mb-3">🚪</div>
                                <h3 className="text-lg font-black text-slate-800 mb-2">¿Volver al menú de inicio?</h3>
                                <p className="text-xs text-slate-500 mb-6">Se reiniciará el recorrido actual y el rastreo de variables en el árbol del circuito.</p>
                                <div className="flex gap-3">
                                    <button
                                        onClick={handleConfirmExit}
                                        className="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg text-xs transition-colors"
                                    >
                                        Sí, salir
                                    </button>
                                    <button
                                        onClick={() => setShowExitConfirm(false)}
                                        className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg text-xs transition-colors border border-slate-200"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
