<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circuito Lógico: Ecosistemas y Animales</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            color: #1e293b; 
            -webkit-font-smoothing: antialiased;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .bg-grid-pattern { 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px); 
            background-size: 24px 24px; 
        }

        /* Line styles for the tree */
        .tree-line {
            transition: stroke 0.3s ease, stroke-width 0.3s ease;
        }
        
        .loop-active {
            animation: loopPulse 1.5s infinite alternate;
        }

        @keyframes loopPulse {
            0% { opacity: 0.5; stroke: #ef4444; }
            100% { opacity: 1; stroke: #b91c1c; }
        }

        .node-box {
            position: absolute;
            z-index: 20;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }
        
        .node-box.active {
            border-color: #ef4444;
            background-color: #fef2f2; /* red-50 */
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .node-box.current {
            border-color: #3b82f6; /* blue-500 */
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
            transform: translate(-50%, -50%) scale(1.05);
            z-index: 30;
        }

        /* Utilidades para scroll táctil */
        .scroll-smooth-mobile {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col h-screen overflow-hidden">
    <div id="root" class="flex-grow flex flex-col h-full overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DEFINICIÓN DEL CIRCUITO LÓGICO ---
        const LOGIC_FLOW = {
            start: 1,
            nodes: {
                1: { 
                    title: 'Estación 1', operator: '', conditions: ['¿Vuela?'], question: '¿El animal Vuela?',
                    paths: { yes: 2, no: 4 }
                },
                2: { 
                    title: 'Estación 2', operator: 'AND', conditions: ['Plumas', 'Colombia'], question: '¿Tiene plumas AND es propio de Colombia?',
                    paths: { yes: 3, no: 'dragon' }
                },
                3: { 
                    title: 'Estación 3', operator: '', conditions: ['¿Sabe nadar?'], question: '¿Sabe nadar?',
                    paths: { yes: 'pato', no: 'aguila' }
                },
                4: { 
                    title: 'Estación 4', operator: 'OR', conditions: ['Pelo', 'Nada'], question: '¿Tiene pelo OR sabe nadar?',
                    paths: { yes: 5, no: 'error' } 
                },
                5: { 
                    title: 'Estación 5', operator: '', conditions: ['¿De Colombia?'], question: '¿Es propio de Colombia?',
                    paths: { yes: 'nutria', no: 'hipopotamo' }
                }
            },
            results: {
                'pato': { animal: 'Pato', eco: 'Lagunas', emoji: '🦆', isLoop: false },
                'dragon': { animal: 'Dragón', eco: 'Fantasía', emoji: '🐉', isLoop: true },
                'aguila': { animal: 'Águila', eco: 'Páramos', emoji: '🦅', isLoop: false },
                'nutria': { animal: 'Nutria', eco: 'Ríos', emoji: '🦦', isLoop: false },
                'hipopotamo': { animal: 'Hipopótamo', eco: 'Sabana', emoji: '🦛', isLoop: false },
                'error': { animal: 'Inválido', eco: 'Sin clasificar', emoji: '❌', isError: true, isLoop: false }
            }
        };

        // --- COMPONENTES DEL GRAFO ---
        // Coordenadas más juntas y compactadas para aprovechar el espacio
        const points = {
            1: [50, 12],   
            2: [28, 38],   
            4: [72, 38],   
            3: [15, 64],   
            'dragon': [42, 64], 
            5: [60, 64],   
            'error': [85, 64],
            'pato': [6, 90],
            'aguila': [24, 90],
            'nutria': [50, 90],
            'hipopotamo': [70, 90]
        };

        const pathLabels = [
            { from: 1, to: 2, label: "SÍ" },
            { from: 1, to: 4, label: "NO" },
            { from: 2, to: 3, label: "SÍ" },
            { from: 2, to: 'dragon', label: "NO" },
            { from: 3, to: 'pato', label: "SÍ" },
            { from: 3, to: 'aguila', label: "NO" },
            { from: 4, to: 5, label: "SÍ" },
            { from: 4, to: 'error', label: "NO" },
            { from: 5, to: 'nutria', label: "SÍ" },
            { from: 5, to: 'hipopotamo', label: "NO" }
        ];

        const SVGConnections = ({ history, isLooping }) => {
            const isPathActive = (from, to) => {
                for (let i = 0; i < history.length - 1; i++) {
                    if (String(history[i]) === String(from) && String(history[i+1]) === String(to)) return true;
                }
                return false;
            };

            const drawLine = (from, to, type="normal") => {
                if (!points[from] || !points[to]) return null;
                
                const [x1, y1] = points[from];
                const [x2, y2] = points[to];
                
                const active = isPathActive(from, to);
                const color = active ? "#ef4444" : "#94a3b8"; // Rojo o un gris más oscuro
                const width = active ? "4" : "3"; // Líneas más gruesas

                if (type === "loop") {
                    return (
                        <line 
                            key={`loop-${from}-${to}`}
                            x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`}
                            stroke={color} strokeWidth={width}
                            strokeDasharray="8,8"
                            className={active ? "loop-active tree-line" : "tree-line"}
                            markerEnd={active ? "url(#arrowhead-active)" : "url(#arrowhead-inactive)"}
                        />
                    );
                }

                return (
                    <line 
                        key={`line-${from}-${to}`}
                        x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`} 
                        stroke={color} strokeWidth={width}
                        className="tree-line"
                    />
                );
            };

            return (
                <div className="absolute inset-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}>
                    <svg className="w-full h-full">
                        <defs>
                            <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                                <polygon points="0 0, 8 3, 0 6" fill="#ef4444" />
                            </marker>
                            <marker id="arrowhead-inactive" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                                <polygon points="0 0, 8 3, 0 6" fill="#94a3b8" />
                            </marker>
                        </defs>
                        
                        {drawLine(1, 2)}
                        {drawLine(1, 4)}
                        {drawLine(2, 3)}
                        {drawLine(2, 'dragon')}
                        {drawLine(3, 'pato')}
                        {drawLine(3, 'aguila')}
                        {drawLine(4, 5)}
                        {drawLine(4, 'error')}
                        {drawLine(5, 'nutria')}
                        {drawLine(5, 'hipopotamo')}
                        {drawLine('dragon', 1, "loop")}
                    </svg>

                    {/* Rótulos SÍ/NO */}
                    {pathLabels.map(({from, to, label}) => {
                        const [x1, y1] = points[from];
                        const [x2, y2] = points[to];
                        const midX = (x1 + x2) / 2;
                        const midY = (y1 + y2) / 2;
                        const active = isPathActive(from, to);

                        return (
                            <div 
                                key={`label-${from}-${to}`}
                                className={`absolute z-10 px-2 py-1 rounded-md text-xs md:text-sm font-black border transition-colors shadow-sm ${
                                    active ? 'bg-red-100 text-red-700 border-red-300' : 'bg-white text-slate-500 border-slate-300'
                                }`}
                                style={{ top: `${midY}%`, left: `${midX}%`, transform: 'translate(-50%, -50%)' }}
                            >
                                {label}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
            const [gameState, setGameState] = useState('menu'); 
            const [currentNode, setCurrentNode] = useState(1);
            const [history, setHistory] = useState([1]); 
            const [finalResult, setFinalResult] = useState(null);
            
            const [unlockedAnimals, setUnlockedAnimals] = useState([]);
            
            const scrollContainerRef = useRef(null);

            // Centrar mapa
            useEffect(() => {
                if (gameState === 'playing' && scrollContainerRef.current) {
                    const container = scrollContainerRef.current;
                    container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2;
                }
            }, [gameState]);

            const startGame = () => {
                setGameState('playing');
                setCurrentNode(1);
                setHistory([1]);
                setFinalResult(null);
            };

            const handleAnswer = (answer) => {
                const nodeData = LOGIC_FLOW.nodes[currentNode];
                const nextNode = nodeData.paths[answer];

                if (!nextNode) return;

                const newHistory = [...history, nextNode];
                setHistory(newHistory);

                if (LOGIC_FLOW.results[nextNode]) {
                    setCurrentNode(nextNode);
                    const resultData = LOGIC_FLOW.results[nextNode];
                    
                    setUnlockedAnimals(prev => {
                        if (!prev.includes(nextNode)) {
                            return [...prev, nextNode];
                        }
                        return prev;
                    });

                    if (resultData.isLoop) {
                        // Cambiamos a estado looping, pero ahora no regresará automáticamente
                        setGameState('looping');
                    } else {
                        setFinalResult(resultData);
                        setGameState('result');
                    }
                } else {
                    setCurrentNode(nextNode);
                }
            };

            const handleContinueLoop = () => {
                // Función para el botón del bucle que permite continuar manualmente
                setHistory(prev => [...prev, 1]);
                setCurrentNode(1);
                setGameState('playing');
            };

            const handleBack = () => {
                if (history.length <= 1 || gameState === 'looping') return;
                
                let newHistory = [...history];
                newHistory.pop(); 
                
                let previousNode = newHistory[newHistory.length - 1];
                
                if (previousNode === 'dragon') {
                    newHistory.pop();
                    previousNode = newHistory[newHistory.length - 1];
                }
                
                setHistory(newHistory);
                setCurrentNode(previousNode);
                setGameState('playing');
                setFinalResult(null);
            };

            if (gameState === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 md:p-8 font-sans bg-grid-pattern flex flex-col items-center justify-center overflow-auto">
                        <div className="max-w-xl w-full bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-slate-200 text-center animate-fade-in my-8">
                            <div className="text-6xl mb-6">🤖🌳</div>
                            <h1 className="text-3xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">Circuito Lógico</h1>
                            <h2 className="text-lg md:text-xl text-slate-500 font-bold mb-8 uppercase tracking-widest">Algoritmo y Robot Humano</h2>
                            
                            <p className="text-slate-600 mb-10 text-base md:text-lg">
                                Recorre el árbol de decisiones. Responde a las condiciones lógicas (<span className="font-bold text-blue-600">AND</span> / <span className="font-bold text-amber-500">OR</span>) en cada estación para descubrir la clasificación del animal y su ecosistema.
                            </p>

                            <button 
                                onClick={startGame}
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-lg md:text-xl py-4 rounded-xl shadow-[0_4px_0_rgb(67,56,202)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(67,56,202)] transition-all"
                            >
                                Comenzar el Juego ▶
                            </button>
                        </div>
                    </div>
                );
            }

            const isNodeVisited = (id) => history.includes(id);
            const isNodeCurrent = (id) => currentNode === id;
            
            // Cajas de Estaciones (Sin opacidad, sin título "Estación X")
            const renderStation = (id, top, left) => {
                const node = LOGIC_FLOW.nodes[id];
                if (!node) return null;
                
                const visited = isNodeVisited(id);
                const current = isNodeCurrent(id);
                
                let boxClass = `node-box bg-white border-2 rounded-xl px-2 py-1.5 md:px-3 md:py-2 text-center shadow-md w-[120px] md:w-[150px] `;
                if (current) boxClass += "current ";
                else if (visited) boxClass += "active text-red-700 ";
                else boxClass += "border-slate-300 "; // Quitamos la opacidad

                return (
                    <div key={`station-${id}`} className={boxClass} style={{ top: `${top}%`, left: `${left}%` }}>
                        {node.operator && (
                            <div className="flex justify-center mb-1">
                                <span className={`text-[10px] md:text-xs font-black px-1.5 py-0.5 rounded leading-none ${visited ? 'bg-red-100 text-red-800' : 'bg-slate-100 text-slate-500'}`}>
                                    {node.conditions.join(` ${node.operator} `)}
                                </span>
                            </div>
                        )}
                        {!node.operator && (
                            <div className={`text-sm md:text-base font-black leading-tight ${visited ? 'text-red-800' : 'text-slate-600'}`}>
                                {node.conditions[0]}
                            </div>
                        )}
                    </div>
                );
            };

            // Cajas de Resultados (Sin opacidad para los no descubiertos)
            const renderResultBox = (id, top, left) => {
                const result = LOGIC_FLOW.results[id];
                const visited = isNodeVisited(id);
                const isUnlocked = unlockedAnimals.includes(id);
                
                if (!visited && !isUnlocked) {
                    return (
                        <div 
                            key={`result-${id}`}
                            className="node-box bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl w-[70px] h-[70px] md:w-[90px] md:h-[90px] flex items-center justify-center"
                            style={{ top: `${top}%`, left: `${left}%` }}
                        >
                            <span className="text-2xl md:text-3xl text-slate-300 font-bold">❓</span>
                        </div>
                    );
                }

                const isError = result.isError || result.isLoop;
                const boxAppearance = !visited ? "scale-95 z-10 bg-slate-50" : "scale-105 z-30 shadow-2xl bg-white"; // Sin opacidad

                return (
                    <div 
                        key={`result-${id}`}
                        className={`node-box border-4 rounded-xl px-1 py-2 md:p-3 text-center shadow-lg w-[95px] md:w-[130px] animate-fade-in ${
                            isError ? 'border-red-600 shadow-red-200' : 'border-emerald-500 shadow-emerald-200'
                        } ${boxAppearance}`}
                        style={{ top: `${top}%`, left: `${left}%` }}
                    >
                        <div className="text-4xl md:text-5xl mb-1 leading-none">{result.emoji}</div>
                        <div className={`font-black text-xs md:text-base leading-tight tracking-tight ${isError ? 'text-red-700' : 'text-emerald-700'}`}>
                            {result.animal}
                        </div>
                        <div className="text-[9px] md:text-xs text-slate-500 font-bold uppercase mt-1 leading-tight">
                            {result.eco}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full bg-slate-50 flex flex-col">
                    {/* BARRA SUPERIOR DE NAVEGACIÓN */}
                    <div className="bg-white border-b border-slate-200 p-3 md:p-4 flex justify-between items-center shadow-sm z-30 relative shrink-0">
                        <button 
                            onClick={handleBack}
                            disabled={history.length <= 1 || gameState === 'looping'}
                            className={`font-bold px-3 py-2 rounded-lg transition-colors flex items-center gap-1 md:gap-2 text-xs md:text-base ${
                                history.length > 1 && gameState !== 'looping' 
                                ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' 
                                : 'bg-slate-50 text-slate-300 cursor-not-allowed'
                            }`}
                        >
                            ⬅ Atrás
                        </button>
                        
                        <div className="text-center flex-grow font-black text-indigo-800 text-base md:text-xl">
                            Circuito Lógico
                        </div>
                        
                        <button 
                            onClick={() => {if(window.confirm('¿Volver al menú?')) setGameState('menu')}}
                            className="bg-rose-100 text-rose-700 hover:bg-rose-200 font-bold px-3 py-2 rounded-lg transition-colors text-xs md:text-base"
                        >
                            Salir
                        </button>
                    </div>

                    {/* ÁREA DEL TABLERO GRÁFICO (MÁS COMPACTA Y CON SCROLL) */}
                    <div ref={scrollContainerRef} className="flex-grow overflow-auto bg-slate-50 scroll-smooth-mobile relative">
                        <div className="relative bg-grid-pattern min-w-[700px] w-full h-[400px] md:h-full mx-auto" style={{ minHeight: '400px' }}>
                            <SVGConnections history={history} isLooping={gameState === 'looping'} />
                            
                            {renderStation(1, 10, 50)}
                            {renderStation(2, 35, 25)}
                            {renderStation(4, 35, 75)}
                            {renderStation(3, 60, 14)}
                            {renderStation(5, 60, 64)}
                            
                            {renderResultBox('dragon', 60, 36)}
                            {renderResultBox('error', 60, 86)}

                            {renderResultBox('pato', 85, 6)}
                            {renderResultBox('aguila', 85, 22)}
                            {renderResultBox('nutria', 85, 56)}
                            {renderResultBox('hipopotamo', 85, 72)}
                        </div>
                    </div>

                    {/* PANEL DE INTERACCIÓN INFERIOR */}
                    <div className="bg-white border-t border-slate-200 p-4 md:p-6 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-30 relative shrink-0 min-h-[190px] flex flex-col justify-center">
                        
                        {gameState === 'playing' && LOGIC_FLOW.nodes[currentNode] && (
                            <div className="max-w-2xl mx-auto w-full text-center animate-fade-in">
                                <p className="text-xl md:text-3xl font-black text-slate-800 mb-4 md:mb-6 leading-tight">
                                    {LOGIC_FLOW.nodes[currentNode].question}
                                </p>
                                
                                <div className="flex justify-center gap-3 md:gap-6">
                                    <button 
                                        onClick={() => handleAnswer('yes')}
                                        className="flex-1 max-w-[150px] md:max-w-[180px] bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg md:text-xl py-3 md:py-4 rounded-xl shadow-[0_4px_0_rgb(5,150,105)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(5,150,105)] transition-all"
                                    >
                                        SÍ
                                    </button>
                                    <button 
                                        onClick={() => handleAnswer('no')}
                                        className="flex-1 max-w-[150px] md:max-w-[180px] bg-rose-500 hover:bg-rose-600 text-white font-black text-lg md:text-xl py-3 md:py-4 rounded-xl shadow-[0_4px_0_rgb(225,29,72)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(225,29,72)] transition-all"
                                    >
                                        NO
                                    </button>
                                </div>
                            </div>
                        )}

                        {gameState === 'looping' && (
                            <div className="max-w-2xl mx-auto w-full text-center animate-fade-in">
                                <div className="text-4xl md:text-5xl mb-2 md:mb-3 animate-bounce">🐲</div>
                                <h3 className="text-lg md:text-2xl font-black text-red-600 mb-2 uppercase">¡Error de Lógica!</h3>
                                <p className="text-xs md:text-base text-slate-600 font-medium px-2 leading-snug mb-4">
                                    El Dragón ha entrado al sistema. Al NO ser de Colombia, el operador AND lo rechaza creando un <strong>BUCLE INFINITO</strong>. 
                                </p>
                                <button 
                                    onClick={handleContinueLoop}
                                    className="bg-red-600 text-white hover:bg-red-700 shadow-[0_4px_0_rgb(185,28,28)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(185,28,28)] font-black px-6 py-2 md:py-3 rounded-xl transition-all text-sm md:text-base inline-block"
                                >
                                    🔄 Continuar (Volver al inicio)
                                </button>
                            </div>
                        )}

                        {gameState === 'result' && finalResult && (
                            <div className="max-w-2xl mx-auto w-full text-center animate-fade-in">
                                <div className="text-4xl md:text-5xl mb-1 md:mb-2">{finalResult.emoji}</div>
                                <h3 className={`text-xs md:text-sm font-bold uppercase tracking-wider mb-1 ${finalResult.isError ? 'text-red-500' : 'text-slate-500'}`}>
                                    {finalResult.isError ? 'Clasificación Fallida' : 'Clasificación Exitosa'}
                                </h3>
                                <p className={`text-xl md:text-3xl font-black mb-1 md:mb-2 ${finalResult.isError ? 'text-red-600' : 'text-emerald-600'}`}>
                                    Animal: {finalResult.animal}
                                </p>
                                <p className="text-sm md:text-base text-slate-700 font-medium mb-3 md:mb-5">
                                    Ecosistema: <span className="font-bold uppercase">{finalResult.eco}</span>
                                </p>
                                
                                {!finalResult.isError && (
                                    <div className="mb-4 bg-slate-50 border border-slate-100 rounded-xl p-2 md:p-3 max-w-xs mx-auto">
                                        <p className="text-[10px] md:text-xs text-slate-400 font-bold uppercase tracking-widest mb-1.5">Descubrimientos</p>
                                        <div className="flex justify-center gap-2 mb-1">
                                            {['pato', 'aguila', 'nutria', 'hipopotamo', 'dragon'].map(animalKey => {
                                                const isUnlocked = unlockedAnimals.includes(animalKey);
                                                const animalData = LOGIC_FLOW.results[animalKey];
                                                return (
                                                    <div 
                                                        key={animalKey} 
                                                        className={`w-7 h-7 md:w-9 md:h-9 rounded-full flex items-center justify-center text-base md:text-xl transition-all ${isUnlocked ? 'bg-indigo-100 shadow-sm' : 'bg-slate-200 grayscale filter'}`} 
                                                    >
                                                        {animalData.emoji}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                
                                <button 
                                    onClick={startGame}
                                    className="bg-indigo-600 text-white hover:bg-indigo-700 shadow-[0_4px_0_rgb(67,56,202)] hover:translate-y-[2px] hover:shadow-[0_2px_0_rgb(67,56,202)] font-black px-6 py-2 md:py-3 rounded-xl transition-all text-sm md:text-base w-full sm:w-auto"
                                >
                                    {unlockedAnimals.length >= 5 ? '🔄 Volver a jugar' : '🔍 Desbloquear otro animal'}
                                </button>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
